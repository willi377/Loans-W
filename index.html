<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Loans W">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="description" content="Loans W - Gestión inteligente de préstamos">
    <title>Loans W - Gestión de Préstamos</title>
    <link rel="manifest" href="data:application/json,{}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js">
    </script>
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --success: #00b894;
            --danger: #ff6b6b;
            --warning: #fdcb6e;
            --info: #74b9ff;
            --bg: #f8f9ff;
            --card-bg: #ffffff;
            --text: #2d3436;
            --text-secondary: #636e72;
            --border: #e0e5ec;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.1);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --font-xs: clamp(0.65rem, 1.5vw, 0.7rem);
            --font-sm: clamp(0.75rem, 1.8vw, 0.82rem);
            --font-md: clamp(0.85rem, 2vw, 0.95rem);
            --font-lg: clamp(1rem, 2.5vw, 1.2rem);
            --font-xl: clamp(1.2rem, 3vw, 1.5rem);
            --font-2xl: clamp(1.4rem, 4vw, 1.8rem);
        }

        .dark-mode {
            --bg: #0f1119;
            --card-bg: #1a1d2e;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #2d3148;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }
        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s var(--bounce) forwards;
        }
        .animate-fade-in-down {
            animation: fadeInDown 0.5s var(--bounce) forwards;
        }
        .animate-scale-in {
            animation: scaleIn 0.4s var(--bounce) forwards;
        }
        .animate-bounce-in {
            animation: bounceIn 0.6s var(--bounce) forwards;
        }

        .stagger>* {
            opacity: 0;
            animation: fadeInUp 0.4s var(--bounce) forwards;
        }
        .stagger>*:nth-child(1) {
            animation-delay: 0.04s;
        }
        .stagger>*:nth-child(2) {
            animation-delay: 0.08s;
        }
        .stagger>*:nth-child(3) {
            animation-delay: 0.12s;
        }
        .stagger>*:nth-child(4) {
            animation-delay: 0.16s;
        }
        .stagger>*:nth-child(5) {
            animation-delay: 0.2s;
        }
        .stagger>*:nth-child(6) {
            animation-delay: 0.24s;
        }

        /* App Container */
        .app-wrapper {
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: clamp(10px, 2vw, 20px);
            padding-bottom: clamp(80px, 15vh, 110px);
        }
        @media (min-width: 768px) {
            .app-wrapper {
                max-width: 900px;
                padding: 20px;
                padding-bottom: 30px;
            }
        }
        @media (min-width: 1024px) {
            .app-wrapper {
                max-width: 1100px;
                padding: 24px;
            }
        }

        /* Header */
        .app-header {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: clamp(10px, 2vw, 16px) clamp(14px, 3vw, 22px);
            margin-bottom: clamp(10px, 2vw, 18px);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            animation: fadeInDown 0.5s var(--bounce);
            transition: var(--transition);
            position: sticky;
            top: clamp(8px, 1.5vw, 16px);
            z-index: 40;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 8px;
        }
        .dark-mode .app-header {
            background: rgba(26, 29, 46, 0.9);
        }
        .brand-name {
            font-size: var(--font-xl);
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            white-space: nowrap;
        }
        .header-actions {
            display: flex;
            gap: clamp(4px, 1vw, 8px);
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .btn-icon {
            width: clamp(32px, 7vw, 42px);
            height: clamp(32px, 7vw, 42px);
            border-radius: 50%;
            border: none;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-size: clamp(14px, 3vw, 18px);
            flex-shrink: 0;
        }
        .btn-icon:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .btn-icon:active {
            transform: scale(0.9);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: clamp(8px, 1.5vw, 12px);
            margin-bottom: clamp(10px, 2vw, 18px);
        }
        @media (min-width: 500px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 14px;
            }
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: clamp(12px, 2.5vw, 18px) clamp(10px, 2vw, 16px);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            min-width: 0;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .stat-card:active {
            transform: scale(0.96);
        }
        .stat-icon {
            width: clamp(34px, 7vw, 46px);
            height: clamp(34px, 7vw, 46px);
            border-radius: clamp(10px, 2vw, 14px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 3.5vw, 22px);
            margin-bottom: clamp(8px, 1.5vw, 12px);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .stat-card:hover .stat-icon {
            transform: scale(1.1) rotate(-5deg);
        }
        .stat-label {
            font-size: var(--font-xs);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stat-value {
            font-size: var(--font-2xl);
            font-weight: 800;
            margin-top: 2px;
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Content Cards */
        .content-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: clamp(10px, 2vw, 14px);
            overflow: hidden;
            transition: var(--transition);
            width: 100%;
        }
        .card-header {
            padding: clamp(10px, 2vw, 15px) clamp(14px, 3vw, 20px);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: var(--font-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-body {
            padding: clamp(10px, 2vw, 16px) clamp(14px, 3vw, 20px);
        }

        /* List Items */
        .list-item {
            display: flex;
            align-items: center;
            padding: clamp(10px, 2vw, 14px) clamp(12px, 2.5vw, 18px);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            gap: clamp(8px, 2vw, 14px);
            transition: var(--transition);
            width: 100%;
            min-width: 0;
        }
        .list-item:hover {
            background: rgba(108, 92, 231, 0.04);
            transform: translateX(3px);
        }
        .list-item:active {
            transform: scale(0.98);
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .avatar {
            width: clamp(34px, 7vw, 44px);
            height: clamp(34px, 7vw, 44px);
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: clamp(14px, 3vw, 18px);
            flex-shrink: 0;
        }
        .list-item-info {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
        .list-item-info .name {
            font-weight: 600;
            font-size: var(--font-sm);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .list-item-info .detail {
            font-size: var(--font-xs);
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Badges */
        .badge-status {
            padding: clamp(3px, 0.8vw, 5px) clamp(8px, 1.5vw, 14px);
            border-radius: 20px;
            font-size: var(--font-xs);
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .badge-active {
            background: #e8e5ff;
            color: #5a4bd1;
        }
        .badge-late {
            background: #ffe0e0;
            color: #d63031;
            animation: pulse 2s ease-in-out infinite;
        }
        .badge-paid {
            background: #d5f5e3;
            color: #00855a;
        }
        .badge-pending {
            background: #fff9e6;
            color: #b8860b;
        }
        .dark-mode .badge-active {
            background: #2d2847;
            color: #a29bfe;
        }
        .dark-mode .badge-late {
            background: #3d1a1a;
            color: #ff8787;
        }
        .dark-mode .badge-paid {
            background: #1a3d2a;
            color: #55efc4;
        }
        .dark-mode .badge-pending {
            background: #3d3520;
            color: #fdcb6e;
        }

        /* Buttons */
        .btn-custom {
            padding: clamp(7px, 1.5vw, 10px) clamp(14px, 3vw, 22px);
            border-radius: 50px;
            font-weight: 700;
            font-size: var(--font-xs);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .btn-custom:active {
            transform: scale(0.95);
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
        }
        .btn-success-custom {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: white;
        }
        .btn-danger-custom {
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            color: white;
        }
        .btn-outline-custom {
            border: 2px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }
        .btn-xs {
            padding: clamp(3px, 0.8vw, 5px) clamp(8px, 1.5vw, 10px);
            font-size: clamp(0.6rem, 1.3vw, 0.7rem);
            border-radius: 30px;
        }

        /* Progress */
        .progress {
            height: clamp(6px, 1.2vw, 10px);
            border-radius: 10px;
            background: var(--border);
            overflow: hidden;
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            border-radius: 10px;
            transition: width 1.2s var(--bounce);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: clamp(8px, 2vw, 16px);
            left: clamp(8px, 2vw, 16px);
            right: clamp(8px, 2vw, 16px);
            background: var(--card-bg);
            display: flex;
            justify-content: space-around;
            padding: clamp(6px, 1.5vw, 10px) clamp(4px, 1vw, 8px);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.12);
            z-index: 100;
            border-radius: 50px;
            border: 1px solid var(--border);
            animation: slideInUp 0.6s var(--bounce);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 600px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: clamp(8px, 1.5vw, 10px);
            color: var(--text-secondary);
            border: none;
            background: none;
            cursor: pointer;
            padding: clamp(5px, 1vw, 8px) clamp(8px, 2vw, 14px);
            border-radius: 30px;
            transition: var(--transition);
            font-weight: 600;
            flex: 1;
            min-width: 0;
        }
        .nav-btn.active {
            color: var(--primary);
            background: rgba(108, 92, 231, 0.1);
            transform: translateY(-3px);
        }
        .nav-btn i {
            font-size: clamp(18px, 3.5vw, 22px);
            margin-bottom: 2px;
        }

        /* Modals */
        .modal-content {
            border-radius: var(--radius-lg);
            border: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: bounceIn 0.5s var(--bounce);
            background: var(--card-bg);
            margin: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-control,
        .form-select {
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            padding: clamp(8px, 1.5vw, 11px) clamp(10px, 2vw, 15px);
            transition: var(--transition);
            font-size: var(--font-sm);
            background: var(--card-bg);
            color: var(--text);
            width: 100%;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
            outline: none;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            top: clamp(10px, 2vw, 20px);
            right: clamp(10px, 2vw, 20px);
            z-index: 9999;
            max-width: 90vw;
        }
        .custom-toast {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: clamp(10px, 2vw, 16px) clamp(14px, 3vw, 20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 8px;
            animation: fadeInUp 0.4s var(--bounce);
            font-weight: 600;
            font-size: var(--font-xs);
            border-left: 4px solid var(--primary);
            backdrop-filter: blur(10px);
        }

        /* Calculator */
        .calc-box {
            background: var(--bg);
            border-radius: var(--radius);
            padding: clamp(12px, 2vw, 18px);
            animation: scaleIn 0.4s var(--bounce);
        }

        /* Tables */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius);
        }
        .table {
            font-size: var(--font-xs);
            min-width: 500px;
            width: 100%;
        }
        .table th {
            font-weight: 600;
            white-space: nowrap;
            padding: clamp(8px, 1.5vw, 12px) clamp(8px, 1.5vw, 10px);
        }
        .table td {
            padding: clamp(6px, 1.2vw, 10px) clamp(8px, 1.5vw, 10px);
            vertical-align: middle;
        }

        /* Delete button animation */
        .btn-delete {
            transition: var(--transition);
        }
        .btn-delete:hover {
            transform: scale(1.15);
            filter: brightness(1.1);
        }

        @media (max-width: 380px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .stat-card {
                padding: 10px 8px;
            }
            .stat-value {
                font-size: clamp(1rem, 5vw, 1.3rem);
            }
            .btn-custom {
                padding: 6px 12px;
                font-size: 0.65rem;
            }
            .bottom-nav {
                padding: 4px 2px;
            }
            .nav-btn {
                padding: 4px 6px;
                font-size: 7px;
            }
            .nav-btn i {
                font-size: 16px;
            }
        }
        @media (min-width: 1600px) {
            .app-wrapper {
                max-width: 1300px;
            }
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- LOGIN -->
        <div id="login-screen" class="d-flex align-items-center justify-content-center" style="min-height:100vh;min-height:100dvh;background:linear-gradient(135deg,#6c5ce7,#a29bfe,#74b9ff);background-size:300% 300%;animation:gradientShift 12s ease infinite;padding:20px;">
            <div class="card p-4 shadow-lg animate-bounce-in" style="width:100%;max-width:380px;border-radius:24px;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.3);">
                <div class="text-center">
                    <div style="width:70px;height:70px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;color:#fff;margin-bottom:16px;animation:float 3s ease-in-out infinite;">W</div>
                    <h3 class="fw-bold mb-1" style="font-size:clamp(1.3rem,3vw,1.8rem);">Loans W</h3>
                    <p class="text-muted mb-3" style="font-size:clamp(0.8rem,2vw,0.95rem);">Gestión inteligente de préstamos</p>
                </div>
                <input type="password" id="login-password" class="form-control mb-3" placeholder="🔒 Contraseña" style="border-radius:14px;padding:14px;font-size:15px;" onkeydown="if(event.key==='Enter')app.login()">
                <button class="btn w-100 py-3 fw-bold text-white" style="background:linear-gradient(135deg,#6c5ce7,#a29bfe);border-radius:14px;font-size:16px;border:none;cursor:pointer;transition:all 0.3s;" onclick="app.login()" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 30px rgba(108,92,231,0.4)'" onmouseout="this.style.transform='';this.style.boxShadow=''">Ingresar al sistema</button>
                <div id="login-error" class="text-danger small mt-3 fw-bold text-center"></div>
                <p class="text-muted small text-center mt-3">Contraseña: <strong>admin</strong></p>
            </div>
        </div>

v></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>
    <script>
        const db = new Dexie('LoansWDBv2');
        db.version(1).stores({
            config: 'clave',
            clientes: '++id,nombre,cedula,categoria',
            prestamos: '++id,cliente_id,estado',
            cuotas: '++id,prestamo_id,estado',
            pagos: '++id,prestamo_id,cuota_id,fecha_pago,metodo',
            notas: '++id,cliente_id,fecha'
        });

        const app = {
            currentUser: null,
            passwordHash: '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918',
            chartInstance: null,
            darkMode: false,

            async init() {
                await db.open();
                await this.seedConfig();
                this.checkAuth();
                this.setupNav();
            },
            async seedConfig() {
                if (!await db.config.get('password_hash')) {
                    await db.config.put({ clave: 'password_hash', valor: this.passwordHash });
                    await db.config.put({ clave: 'tasa_mora', valor: '5' });
                    await db.config.put({ clave: 'dark_mode', valor: 'false' });
                }
                const dm = await db.config.get('dark_mode');
                if (dm?.valor === 'true') { this.darkMode = true;
                    document.body.classList.add('dark-mode'); }
            },
            checkAuth() {
                if (localStorage.getItem('loansw_auth') === 'true') {
                    this.currentUser = { id: 1, nombre: 'Admin' };
                    this.showApp();
                } else { document.getElementById('login-screen').style.display = 'flex';
                    document.getElementById('main-app').style.display = 'none'; }
            },
            async sha256(m) { const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m)); return Array
                    .from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join(''); },
            async login() {
                const p = document.getElementById('login-password').value;
                if (!p) { document.getElementById('login-error').textContent = 'Ingrese la contraseña'; return; }
                if (await this.sha256(p) === (await db.config.get('password_hash')).valor) {
                    localStorage.setItem('loansw_auth', 'true');
                    this.currentUser = { id: 1, nombre: 'Admin' };
                    this.showApp();
                    this.toast('¡Bienvenido! 🎉', 'Sesión iniciada', 'success');
                } else { document.getElementById('login-error').textContent = '❌ Contraseña incorrecta'; }
            },
            showApp() { document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                this.navigateTo('dashboard'); },
            setupNav() { document.querySelectorAll('.nav-btn').forEach(b => b.addEventListener('click', () => this
                    .navigateTo(b.dataset.page))); },
            navigateTo(p) { document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); const a =
                    document.querySelector(`.nav-btn[data-page="${p}"]`); if (a) a.classList.add('active'); this
                .renderPage(p);
                window.scrollTo({ top: 0, behavior: 'smooth' }); },
            async renderPage(p) { const c = document.getElementById('page-content');
                c.style.opacity = '0';
                c.style.transform = 'translateY(15px)'; switch (p) { case 'dashboard':
                    c.innerHTML = await this.dashHTML(); break; case 'clientes':
                    c.innerHTML = this.clientesHTML(); break; case 'prestamos':
                    c.innerHTML = await this.prestamosHTML(); break; case 'mora':
                    c.innerHTML = await this.moraHTML(); break; case 'reportes':
                    c.innerHTML = await this.reportesHTML(); break; } setTimeout(() => { c.style.transition =
                        'all 0.4s var(--bounce)';
                    c.style.opacity = '1';
                    c.style.transform = 'translateY(0)'; }, 50); await this.initPage(p); },
            async initPage(p) { if (p === 'dashboard') await this.initDash(); if (p === 'clientes') await this
                    .cargarClientes(); if (p === 'prestamos') await this.cargarPrestamos(); if (p === 'reportes') await this
                    .initReportes(); },
            toast(t, m, ty = 'info') { const co = document.getElementById('toast-container'); const d = document
                    .createElement('div');
                d.className = 'custom-toast';
                d.style.borderLeftColor = ty === 'success' ? 'var(--success)' : ty === 'danger' ? 'var(--danger)' :
                    'var(--primary)';
                d.innerHTML = `<strong>${t}</strong><br><small>${m}</small>`;
                co.appendChild(d);
                setTimeout(() => { d.style.opacity = '0';
                    d.style.transform = 'translateX(100px)';
                    d.style.transition = 'all 0.4s ease-in';
                    setTimeout(() => d.remove(), 400); }, 3000); },
            async dashHTML() { const act = await db.prestamos.where({ estado: 'activo' }).toArray(); let car = 0,
                    pen = 0; for (let p of act) { car += p.monto; const cu = await db.cuotas.where({ prestamo_id: p
                            .id }).and(c => c.estado !== 'pagada').toArray(); for (let c of cu) pen += c
                    .monto_total; } const ini = new Date(new Date().getFullYear(), new Date().getMonth(), 1); const pag =
                    await db.pagos.where('fecha_pago').between(ini.getTime(), Date.now()).toArray(); const cob = pag
                    .reduce((s, p) => s + p.monto_pagado, 0); const atr = await db.cuotas.where({ estado: 'atrasada' })
                    .toArray(); const cm = new Set(); for (let c of atr) { const pr = await db.prestamos.get(c
                        .prestamo_id); if (pr) cm.add(pr.cliente_id); } return `
            <div class="app-header"><span class="brand-name">Loans W</span><div class="header-actions"><button class="btn-icon" onclick="app.mostrarCalculadora()" title="Calculadora">🧮</button><button class="btn-icon" onclick="app.mostrarConfig()" title="Configuración">⚙️</button><button class="btn-icon" onclick="app.logout()" title="Salir">↩️</button></div></div>
            <div class="stats-grid stagger">
              <div class="stat-card" onclick="app.navigateTo('prestamos')"><div class="stat-icon" style="background:#e8e5ff;color:#6c5ce7;">💰</div><div class="stat-label">Cartera Activa</div><div class="stat-value">$${car.toLocaleString()}</div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#d5f5e3;color:#00b894;">📈</div><div class="stat-label">Cobrado del Mes</div><div class="stat-value" style="color:#00b894;">$${cob.toLocaleString()}</div></div>
              <div class="stat-card"><div class="stat-icon" style="background:#fff9e6;color:#fdcb6e;">⏳</div><div class="stat-label">Pendiente</div><div class="stat-value" style="color:#f39c12;">$${pen.toLocaleString()}</div></div>
              <div class="stat-card" onclick="app.navigateTo('mora')"><div class="stat-icon" style="background:#ffe0e0;color:#ff6b6b;">⚠️</div><div class="stat-label">En Mora</div><div class="stat-value" style="color:#ff6b6b;">${cm.size}</div></div>
            </div>
            <div class="content-card"><div class="card-header">⏰ Pagos de Hoy <span class="badge-status badge-active" id="count-hoy">0</span></div><div class="card-body" id="pagos-hoy"></div></div>
            <div class="content-card"><div class="card-header">📈 Progreso de Préstamos</div><div class="card-body" id="progreso-pagos"></div></div>`; },
            async initDash() { const hoy = new Date();
                hoy.setHours(0, 0, 0, 0); const pag = await db.pagos.where('fecha_pago').between(hoy.getTime(), hoy
                    .getTime() + 86400000).toArray();
                document.getElementById('count-hoy').textContent = pag.length; let h = ''; for (let p of pag) { const pr =
                        await db.prestamos.get(p.prestamo_id); if (!pr) continue; const cl = await db.clientes.get(pr
                        .cliente_id);
                    h +=
                    `<div class="d-flex justify-content-between align-items-center py-2 border-bottom"><div><strong>${cl?.nombre||'?'}</strong><br><small>${p.metodo||'efectivo'} · ${new Date(p.fecha_pago).toLocaleTimeString()}</small></div><strong style="color:#00b894;">+$${p.monto_pagado.toFixed(0)}</strong></div>`; }
                document.getElementById('pagos-hoy').innerHTML = h ||
                    '<p class="text-muted text-center">Sin pagos hoy</p>'; const act = await db.prestamos.where({ estado: 'activo' })
                    .toArray(); let hp = ''; for (let p of act) { const cl = await db.clientes.get(p.cliente_id); if (!cl)
                        continue; const cu = await db.cuotas.where({ prestamo_id: p.id }).toArray(); const pagadas = cu
                    .filter(c => c.estado === 'pagada').length; const porc = cu.length > 0 ? Math.round((pagadas / cu
                        .length) * 100) : 0; const color = porc >= 80 ? '#00b894' : porc >= 40 ? '#fdcb6e' : '#ff6b6b';
                    hp +=
                    `<div class="mb-3" onclick="app.verPrestamo(${p.id})" style="cursor:pointer;"><div class="d-flex justify-content-between mb-1"><span><strong>${cl.nombre}</strong></span><span>${pagadas}/${cu.length} (${porc}%)</span></div><div class="progress"><div class="progress-bar" style="width:${porc}%;background:${color};"></div></div><small class="text-muted">$${p.monto.toLocaleString()} · ${p.frecuencia}</small></div>`; }
                document.getElementById('progreso-pagos').innerHTML = hp ||
                    '<p class="text-muted text-center">Sin préstamos</p>'; },
            clientesHTML() { return `<div class="app-header"><span class="brand-name">Loans W</span><button class="btn-custom btn-primary-custom" onclick="app.mostrarFormCliente()">➕ Nuevo</button></div><input class="form-control mb-2" id="buscar-cliente" placeholder="🔍 Buscar cliente..." oninput="app.cargarClientes()"><div class="content-card"><div class="card-body p-0 stagger" id="lista-clientes"></div></div>`; },
            async cargarClientes() { const t = document.getElementById('buscar-cliente')?.value?.toLowerCase() || ''; let
                    cl = await db.clientes.toArray(); if (t) cl = cl.filter(c => c.nombre.toLowerCase().includes(t) || (c
                        .cedula || '').includes(t));
                cl.sort((a, b) => b.id - a.id);
                document.getElementById('lista-clientes').innerHTML = cl.map(c => `
            <div class="list-item" onclick="app.verCliente(${c.id})"><div class="avatar">${c.nombre[0].toUpperCase()}</div><div class="list-item-info"><div class="name">${c.nombre}</div><div class="detail">${c.cedula||'Sin ID'} · ${c.categoria==='vip'?'👑':c.categoria==='riesgoso'?'⚠️':'⭐'} ${c.categoria}</div></div><i class="bi bi-chevron-right"></i></div>`).join('') || '<p class="text-muted p-4 text-center">No hay clientes</p>'; },
            async mostrarFormCliente(id = null) { const c = id ? await db.clientes.get(id) : {};
                document.getElementById('cliente-id').value = id || '';
                document.getElementById('cliente-nombre').value = c.nombre || '';
                document.getElementById('cliente-telefono').value = c.telefono || '';
                document.getElementById('cliente-cedula').value = c.cedula || '';
                document.getElementById('cliente-direccion').value = c.direccion || '';
                document.getElementById('cliente-aval').value = c.aval || '';
                document.getElementById('cliente-categoria').value = c.categoria || 'regular'; new bootstrap.Modal(document
                    .getElementById('modalCliente')).show(); },
            async guardarCliente() { const id = document.getElementById('cliente-id').value; const d = { nombre: document
                        .getElementById('cliente-nombre').value.trim(), telefono: document.getElementById(
                            'cliente-telefono').value.trim(), cedula: document.getElementById('cliente-cedula').value
                        .trim(), direccion: document.getElementById('cliente-direccion').value.trim(), aval: document
                        .getElementById('cliente-aval').value.trim(), categoria: document.getElementById(
                            'cliente-categoria').value }; if (!d.nombre) return this.toast('Error',
                    'Nombre obligatorio', 'danger'); if (id) await db.clientes.update(Number(id), d); else await db
                    .clientes.add(d);
                bootstrap.Modal.getInstance(document.getElementById('modalCliente')).hide();
                this.cargarClientes();
                this.toast('✅', 'Cliente guardado', 'success'); },
            async verCliente(id) { const c = await db.clientes.get(id); const ps = await db.prestamos.where({ cliente_id: id
                    }).toArray(); const ns = await db.notas.where({ cliente_id: id }).toArray();
                ns.sort((a, b) => b.fecha - a.fecha); let hp = ''; for (let p of ps) { const cu = await db.cuotas.where(
                        { prestamo_id: p.id }).toArray(); const pag = cu.filter(x => x.estado === 'pagada').length;
                    hp +=
                    `<div class="list-item" onclick="app.verPrestamo(${p.id})"><div class="avatar">$</div><div class="list-item-info"><div class="name">$${p.monto.toLocaleString()}</div><div class="detail">${pag}/${cu.length} pagadas</div></div><span class="badge-status ${p.estado==='activo'?'badge-active':'badge-paid'}">${p.estado}</span></div>`; }
                document.getElementById('page-content').innerHTML = `
            <div class="app-header"><span class="brand-name" style="font-size:var(--font-md);">${c.nombre}</span><button class="btn-icon" onclick="app.navigateTo('clientes')">←</button></div>
            <div class="content-card"><div class="card-body"><p><strong>Cédula:</strong> ${c.cedula||'-'}</p><p><strong>Tel:</strong> ${c.telefono||'-'}</p><p><strong>Cat:</strong> ${c.categoria||'regular'}</p><button class="btn-custom btn-primary-custom me-1" onclick="app.mostrarFormCliente(${c.id})">✏️</button><button class="btn-custom btn-outline-custom" onclick="app.agregarNota(${c.id})">📝</button></div></div>
            <h6 class="mt-3 fw-bold">📋 Préstamos</h6><div class="content-card"><div class="card-body p-0">${hp||'<p class="text-muted p-4 text-center">Sin préstamos</p>'}</div></div>
            <h6 class="mt-3 fw-bold">📝 Notas</h6><div class="content-card"><div class="card-body">${ns.map(n=>`<div class="mb-2 p-2" style="background:var(--bg);border-radius:10px;"><small class="text-muted">${new Date(n.fecha).toLocaleString()}</small><p class="mb-0">${n.texto}</p></div>`).join('')||'<small class="text-muted">Sin notas</small>'}</div></div>`; },
            async agregarNota(clienteId) { const texto = prompt('📝 Nota:'); if (texto) { await db.notas.add({ cliente_id:
                        clienteId, texto, fecha: Date.now() });
                    this.verCliente(clienteId);
                    this.toast('✅', 'Nota guardada', 'success'); } },
            async prestamosHTML() { return `<div class="app-header"><span class="brand-name">Loans W</span><button class="btn-custom btn-primary-custom" onclick="app.mostrarFormPrestamo()">➕ Nuevo</button></div><select class="form-select mb-2" id="filtro-prestamos" onchange="app.cargarPrestamos()"><option value="todos">Todos</option><option value="activo">Activos</option><option value="pagado">Pagados</option></select><div class="content-card"><div class="card-body p-0 stagger" id="lista-prestamos"></div></div>`; },
            async cargarPrestamos() { const f = document.getElementById('filtro-prestamos')?.value || 'todos'; let ps =
                    await db.prestamos.toArray(); if (f !== 'todos') ps = ps.filter(p => p.estado === f);
                ps.sort((a, b) => b.id - a.id); let h = ''; for (let p of ps) { const cl = await db.clientes.get(p
                        .cliente_id); const cu = await db.cuotas.where({ prestamo_id: p.id }).toArray(); const pag = cu
                    .filter(c => c.estado === 'pagada').length; const porc = cu.length > 0 ? Math.round((pag / cu.length) *
                        100) : 0;
                    h +=
                    `<div class="list-item" onclick="app.verPrestamo(${p.id})"><div class="avatar">${cl?.nombre?.[0]||'?'}</div><div class="list-item-info"><div class="name">${cl?.nombre||'?'}</div><div class="detail">$${p.monto.toLocaleString()} · ${porc}%</div><div class="progress mt-1"><div class="progress-bar" style="width:${porc}%;background:${porc>70?'#00b894':porc>30?'#fdcb6e':'#ff6b6b'};"></div></div></div><span class="badge-status ${p.estado==='activo'?'badge-active':'badge-paid'}">${p.estado}</span></div>`; }
                document.getElementById('lista-prestamos').innerHTML = h ||
                    '<p class="text-muted p-4 text-center">No hay préstamos</p>'; },
            async mostrarFormPrestamo(id = null) { const cls = await db.clientes.toArray();
                document.getElementById('prestamo-cliente').innerHTML = '<option value="">Seleccionar...</option>' + cls
                    .map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                document.getElementById('prestamo-id').value = id || '';
                document.getElementById('vista-amortizacion').style.display = 'none'; if (id) { const p = await db.prestamos
                        .get(id);
                    document.getElementById('prestamo-cliente').value = p.cliente_id;
                    document.getElementById('prestamo-monto').value = p.monto;
                    document.getElementById('prestamo-tasa').value = p.tasa_interes;

            calcAmort(monto, tasa, tipo, plazo, fechaIni = null) { const fecha = fechaIni ? new Date(fechaIni) : new Date(
                    document.getElementById('prestamo-fecha').value || new Date()); const frec = document.getElementById(

            async eliminarPrestamo(id) { if (confirm('⚠️ ¿Eliminar este préstamo y TODAS sus cuotas y pagos? Esta acción NO se puede deshacer.')) { await db.cuotas
