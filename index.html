<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6c5ce7">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; frame-ancestors 'none';">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <title>Loans W - Capital & Finanzas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);--bg:#f0f2ff;--card:#fff;--text:#1e1e2e;--sub:#5a5a7a;--border:#e2e4f0;--primary:#6c5ce7;--success:#00b894;--danger:#ff6b6b;--warning:#f59e0b;--info:#3b82f6;--shadow:0 2px 10px rgba(0,0,0,0.06);--radius:clamp(0.6rem,2vw,1rem);--font-xs:clamp(0.55rem,1.4vw,0.68rem);--font-sm:clamp(0.65rem,1.6vw,0.8rem);--font-md:clamp(0.75rem,1.9vw,0.9rem);--font-lg:clamp(0.9rem,2.3vw,1.2rem);--spacing-xs:clamp(0.2rem,0.6vw,0.4rem);--spacing-sm:clamp(0.4rem,1vw,0.6rem);--spacing-md:clamp(0.6rem,1.5vw,0.9rem);}
        .dark-mode{--bg:#0a0c18;--card:#151829;--text:#e8eaf0;--sub:#9094b0;--border:#252840;--shadow:0 2px 10px rgba(0,0,0,0.3)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html{font-size:16px;-webkit-text-size-adjust:100%;height:-webkit-fill-available}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column;padding-top:var(--sat);padding-bottom:var(--sab);padding-left:var(--sal);padding-right:var(--sar)}
        #login-screen{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6c5ce7,#a29bfe);z-index:9999;padding:var(--spacing-sm);padding-top:calc(var(--sat) + var(--spacing-sm));padding-bottom:calc(var(--sab) + var(--spacing-sm))}
        .login-card{background:rgba(255,255,255,0.96);border-radius:1.2rem;padding:clamp(1.5rem,5vw,2.5rem);width:min(100%,22rem);text-align:center}
        .login-logo{width:clamp(3rem,10vw,4rem);height:clamp(3rem,10vw,4rem);background:var(--primary);border-radius:1rem;display:inline-flex;align-items:center;justify-content:center;font-size:clamp(1.5rem,5vw,2rem);color:#fff;margin-bottom:var(--spacing-sm)}
        .login-input{border:2px solid var(--border);border-radius:var(--radius);padding:0.8rem;font-size:var(--font-md);width:100%;margin-bottom:0.5rem;background:var(--card);color:var(--text)}
        .login-input:focus{border-color:var(--primary);outline:none}
        .login-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius);padding:0.8rem;font-size:var(--font-md);font-weight:700;width:100%;cursor:pointer}
        .login-btn:disabled{opacity:0.5;cursor:not-allowed}
        #main-app{display:none;flex:1;flex-direction:column;min-height:100vh}
        #main-app.show{display:flex}
        .app-wrap{flex:1;width:min(100%,75rem);margin:0 auto;padding:var(--spacing-md);padding-bottom:calc(4.5rem + var(--sab) + var(--spacing-md))}
        .header{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm) var(--spacing-md);margin-bottom:var(--spacing-md);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);position:sticky;top:calc(var(--sat) + var(--spacing-xs));z-index:40;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-wrap:wrap;gap:var(--spacing-xs)}
        .brand{font-size:var(--font-lg);font-weight:800;color:var(--primary)}
        .header-actions{display:flex;gap:var(--spacing-xs)}
        .btn-icon{width:clamp(2rem,7vw,2.5rem);height:clamp(2rem,7vw,2.5rem);border-radius:50%;border:none;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:clamp(0.9rem,3vw,1.1rem)}
        .btn-icon:active{transform:scale(0.9)}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--spacing-sm);margin-bottom:var(--spacing-md)}
        @media(min-width:35rem){.stats-grid{grid-template-columns:repeat(4,1fr)}}
        .stat-card{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm);box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;min-width:0;transition:transform 0.2s}
        .stat-card:active{transform:scale(0.96)}
        .stat-icon{width:clamp(1.8rem,6vw,2.3rem);height:clamp(1.8rem,6vw,2.3rem);border-radius:0.5rem;display:flex;align-items:center;justify-content:center;font-size:clamp(0.8rem,2.5vw,1.1rem);margin-bottom:var(--spacing-xs)}
        .stat-label{font-size:var(--font-xs);color:var(--sub);text-transform:uppercase;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .stat-value{font-size:var(--font-lg);font-weight:800;margin-top:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:var(--spacing-md);overflow:hidden;width:100%}
        .card-header{padding:var(--spacing-sm) var(--spacing-md);border-bottom:1px solid var(--border);font-weight:700;font-size:var(--font-sm);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--spacing-xs)}
        .card-body{padding:var(--spacing-sm) var(--spacing-md)}
        .list-item{display:flex;align-items:center;padding:var(--spacing-sm) var(--spacing-md);border-bottom:1px solid var(--border);cursor:pointer;gap:var(--spacing-sm);width:100%}
        .list-item:last-child{border-bottom:none}
        .avatar{width:clamp(1.8rem,6vw,2.3rem);height:clamp(1.8rem,6vw,2.3rem);border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:var(--font-xs);flex-shrink:0}
        .item-info{flex:1;min-width:0;overflow:hidden}
        .item-name{font-weight:600;font-size:var(--font-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .item-detail{font-size:var(--font-xs);color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .badge{padding:0.15rem 0.5rem;border-radius:1rem;font-size:var(--font-xs);font-weight:700;white-space:nowrap}
        .badge-a{background:#e9e5ff;color:#4a3cc7}.badge-l{background:#ffe4e4;color:#d63031}.badge-p{background:#d6f7ee;color:#007a55}.badge-w{background:#fff8e6;color:#b07d00}.badge-i{background:#dbeafe;color:#1e40af}
        .dark-mode .badge-a{background:#2d2750;color:#b8b0ff}.dark-mode .badge-l{background:#3d1c1c;color:#ff8a8a}.dark-mode .badge-p{background:#1a332a;color:#4fe0b0}.dark-mode .badge-i{background:#1a2740;color:#93c5fd}
        .btn{padding:clamp(0.35rem,1.2vw,0.55rem) clamp(0.7rem,2.5vw,1.1rem);border-radius:3rem;font-weight:700;font-size:var(--font-xs);cursor:pointer;border:none;display:inline-flex;align-items:center;gap:0.2rem;white-space:nowrap;transition:all 0.2s}
        .btn:active{transform:scale(0.95)}.btn:disabled{opacity:0.45;cursor:not-allowed}
        .btn-p{background:var(--primary);color:#fff}.btn-s{background:var(--success);color:#fff}.btn-d{background:var(--danger);color:#fff}.btn-o{border:2px solid var(--primary);color:var(--primary);background:transparent}.btn-xs{padding:0.12rem 0.35rem;font-size:0.55rem}
        .prog{height:clamp(0.3rem,0.9vw,0.45rem);border-radius:0.5rem;background:var(--border);overflow:hidden;width:100%}
        .prog-b{height:100%;border-radius:0.5rem}
        .nav{position:fixed;bottom:calc(var(--sab) + var(--spacing-xs));left:50%;transform:translateX(-50%);background:var(--card);display:flex;justify-content:space-around;padding:var(--spacing-xs) 0;box-shadow:0 -4px 20px rgba(0,0,0,0.1);z-index:100;border-radius:2.5rem;border:1px solid var(--border);width:min(98%,32rem);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
        @media(min-width:48rem){.nav{display:none}}
        .nav-btn{display:flex;flex-direction:column;align-items:center;font-size:0.5rem;color:var(--sub);border:none;background:none;cursor:pointer;padding:0.2rem 0.4rem;border-radius:1.5rem;font-weight:600}
        .nav-btn.active{color:var(--primary);background:rgba(108,92,231,0.1)}
        .nav-btn i{font-size:clamp(1rem,3vw,1.25rem);margin-bottom:1px}
        canvas{width:100%!important;max-height:clamp(9rem,28vw,13rem)}
        .modal-content{border-radius:1.2rem;border:none;margin:var(--spacing-sm);max-height:85vh;max-height:85dvh;overflow-y:auto}
        .f-control{border-radius:0.4rem;border:2px solid var(--border);padding:clamp(0.35rem,1.2vw,0.55rem) clamp(0.45rem,1.8vw,0.7rem);font-size:var(--font-sm);background:var(--card);color:var(--text);width:100%;margin-bottom:var(--spacing-xs)}
        .f-control:focus{border-color:var(--primary);outline:none}
        .toast-box{position:fixed;top:calc(var(--sat) + var(--spacing-sm));right:calc(var(--sar) + var(--spacing-sm));z-index:9999;max-width:90vw}
        .toast{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm) var(--spacing-md);box-shadow:0 8px 20px rgba(0,0,0,0.15);margin-bottom:var(--spacing-xs);font-weight:600;font-size:var(--font-xs);border-left:4px solid var(--primary);word-break:break-word}
        .table-responsive{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .table{font-size:var(--font-xs);min-width:28rem;width:100%;margin:0}
        .table th{font-weight:600;padding:var(--spacing-xs) var(--spacing-sm);white-space:nowrap}
        .table td{padding:var(--spacing-xs) var(--spacing-sm);white-space:nowrap}
        .summary-box{background:var(--bg);border-radius:var(--radius);padding:var(--spacing-sm);margin-top:var(--spacing-sm)}
        .text-success{color:var(--success)!important}.text-danger{color:var(--danger)!important}.text-warning{color:var(--warning)!important}.text-info{color:var(--info)!important}
        .d-flex{display:flex}.justify-between{justify-content:space-between}.items-center{align-items:center}
        .py-1{padding-top:0.25rem;padding-bottom:0.25rem}.mb-1{margin-bottom:0.25rem}.mb-2{margin-bottom:0.5rem}.mb-3{margin-bottom:0.75rem}
        .w-100{width:100%}.text-center{text-align:center}.text-end{text-align:end}.fw-bold{font-weight:700}
        .p-0{padding:0}.p-3{padding:0.75rem}.p-4{padding:1rem}.text-muted{color:var(--sub)}
        .row{display:flex;flex-wrap:wrap}.col-6{flex:0 0 50%;max-width:50%}.g-2{gap:0.5rem}
        .kpi-big{font-size:clamp(1.5rem,5vw,2.5rem);font-weight:800;letter-spacing:-0.5px}
        @media(max-width:22rem){.stats-grid{grid-template-columns:repeat(2,1fr);gap:0.2rem}.nav-btn{font-size:0.45rem}.nav-btn i{font-size:0.9rem}}
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="login-logo">W</div>
            <h3 style="font-weight:800;margin-bottom:0.2rem;font-size:clamp(1.1rem,3.5vw,1.4rem)">Loans W</h3>
            <p style="color:var(--sub);margin-bottom:var(--spacing-sm);font-size:var(--font-xs)">Capital & Finanzas</p>
            <input type="password" id="pwd" class="login-input" placeholder="🔒 Contraseña" autocomplete="off" maxlength="128">
            <button class="login-btn" id="loginBtn">Ingresar</button>
            <div id="login-err" style="color:#ff6b6b;font-weight:600;margin-top:0.5rem;font-size:0.7rem"></div>
            <div id="login-locked" style="display:none;color:#f59e0b;font-weight:600;margin-top:0.5rem;font-size:0.7rem"></div>
            <p style="color:var(--sub);font-size:0.6rem;margin-top:0.5rem">Contraseña: <strong>admin</strong></p>
        </div>
    </div>

    <div id="main-app">
        <div class="app-wrap" id="page"><div class="text-center" style="padding:2.5rem;color:var(--sub)">Cargando...</div></div>
        <nav class="nav">
            <button class="nav-btn active" data-p="dashboard"><i class="bi bi-speedometer2"></i><span>Inicio</span></button>
            <button class="nav-btn" data-p="finanzas"><i class="bi bi-bank"></i><span>Capital</span></button>
            <button class="nav-btn" data-p="clientes"><i class="bi bi-people-fill"></i><span>Clientes</span></button>
            <button class="nav-btn" data-p="prestamos"><i class="bi bi-cash-stack"></i><span>Préstamos</span></button>
            <button class="nav-btn" data-p="reportes"><i class="bi bi-graph-up-arrow"></i><span>Reportes</span></button>
        </nav>
    </div>
    <div class="toast-box" id="toasts"></div>

    <!-- MODALES -->
    <div class="modal fade" id="modCliente"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>👤 Cliente</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="cid"><input class="f-control" id="cnom" placeholder="Nombre completo *" maxlength="100"><div class="row g-2"><div class="col-6"><input class="f-control" id="ctel" placeholder="Teléfono" maxlength="20"></div><div class="col-6"><input class="f-control" id="cced" placeholder="Cédula" maxlength="20"></div></div><input class="f-control" id="cdir" placeholder="Dirección" maxlength="200"><input class="f-control" id="cava" placeholder="Aval" maxlength="100"><select class="f-control" id="ccat"><option value="regular">⭐ Regular</option><option value="vip">👑 VIP</option><option value="riesgoso">⚠️ Riesgoso</option></select></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-p" onclick="APP.saveCliente()">💾 Guardar</button></div></div></div></div>
    <div class="modal fade" id="modPrestamo"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>💰 Nuevo Préstamo</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="pid"><div class="mb-1"><label class="fw-bold" style="font-size:var(--font-xs)">Cliente *</label><select class="f-control" id="pcli"><option value="">Seleccionar...</option></select></div><div class="row g-2 mb-1"><div class="col-6"><label class="fw-bold" style="font-size:var(--font-xs)">Monto ($) *</label><input type="number" class="f-control" id="pmonto" placeholder="Ej: 1000000" min="1000" max="100000000" step="1000"></div><div class="col-6"><label class="fw-bold" style="font-size:var(--font-xs)">Tasa (%) *</label><input type="number" class="f-control" id="ptasa" placeholder="Ej: 10" min="0.01" max="999" step="0.01"></div></div><div class="mb-1"><label class="fw-bold" style="font-size:var(--font-xs)">Tipo</label><select class="f-control" id="ptipo"><option value="simple">Simple</option><option value="saldo">Sobre Saldo</option></select></div><div class="row g-2 mb-1"><div class="col-6"><label class="fw-bold" style="font-size:var(--font-xs)">Fecha *</label><input type="date" class="f-control" id="pfecha"></div><div class="col-6"><label class="fw-bold" style="font-size:var(--font-xs)">Frecuencia *</label><select class="f-control" id="pfrec"><option value="semanal">Semanal</option><option value="quincenal">Quincenal</option><option value="mensual">Mensual</option><option value="diaria">Diaria</option></select></div></div><div class="mb-1"><label class="fw-bold" style="font-size:var(--font-xs)">Cuotas *</label><input type="number" class="f-control" id="pcuotas" placeholder="Ej: 12" min="1" max="120"></div><div id="loan-summary" class="summary-box" style="display:none"><h6 class="fw-bold mb-1">📋 Resumen</h6><div id="summary-content"></div></div><div id="amort-vista" style="display:none;background:var(--bg);border-radius:var(--radius);padding:var(--spacing-sm);margin-top:var(--spacing-sm)"><h6 class="fw-bold">📅 Cronograma</h6><div class="table-responsive" style="max-height:12rem"><table class="table table-sm"><thead><tr><th>#</th><th>Fecha</th><th>Capital</th><th>Interés</th><th>Cuota</th><th>Saldo</th></tr></thead><tbody id="amort-body"></tbody></table></div></div><div id="loan-error" class="text-danger" style="font-size:var(--font-xs);margin-top:var(--spacing-xs);display:none"></div></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-p" id="btnCreateLoan" onclick="APP.savePrestamo()" disabled>✅ Crear</button></div></div></div></div>
    <div class="modal fade" id="modPago"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>💵 Pago</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="pgpid"><select class="f-control" id="pgcuota"></select><input type="number" class="f-control" id="pgmonto" placeholder="Monto *" min="1"><select class="f-control" id="pgmetodo"><option value="efectivo">Efectivo</option><option value="nequi">Nequi</option><option value="transferencia">Transferencia</option></select></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-s" onclick="APP.savePago()">✅ Registrar</button></div></div></div></div>
    <div class="modal fade" id="modCapital"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>💰 Registrar Capital</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="number" class="f-control" id="capMonto" placeholder="Monto a agregar *" min="1" max="1000000000"><input class="f-control" id="capNota" placeholder="Nota (opcional)" maxlength="200"></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-p" onclick="APP.saveCapital()">💾 Registrar</button></div></div></div></div>
    <div class="modal fade" id="modGasto"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>🧾 Registrar Gasto</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><select class="f-control" id="gasCat"><option value="transporte">🚗 Transporte</option><option value="gasolina">⛽ Gasolina</option><option value="papeleria">📄 Papelería</option><option value="comisiones">💼 Comisiones</option><option value="perdidas">❌ Pérdidas</option><option value="otro">📌 Otro</option></select><input type="number" class="f-control" id="gasMonto" placeholder="Monto del gasto *" min="1"><input class="f-control" id="gasNota" placeholder="Nota (opcional)" maxlength="200"></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-d" onclick="APP.saveGasto()">💾 Registrar</button></div></div></div></div>
    <div class="modal fade" id="modConfig"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>⚙️ Configuración</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="password" class="f-control" id="cfgPwd" placeholder="Nueva contraseña (mínimo 6 caracteres)" minlength="6" maxlength="128"><input type="number" class="f-control" id="cfgMora" placeholder="Tasa mora %"><div class="form-check mb-2"><input class="form-check-input" type="checkbox" id="cfgDark"><label style="font-size:var(--font-xs)">🌙 Modo oscuro</label></div><hr><button class="btn btn-o w-100 mb-2" onclick="APP.exportBD()">📥 Exportar BD</button><button class="btn btn-o w-100" onclick="document.getElementById('impFile').click()">📤 Importar BD</button><input type="file" id="impFile" accept=".json,.lwenc" hidden onchange="APP.importBD(event)"></div><div class="modal-footer"><button class="btn btn-p" onclick="APP.saveConfig()">💾 Guardar</button></div></div></div></div>
    <div class="modal fade" id="modCalc"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>🧮 Calculadora</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="number" class="f-control" id="calcM" placeholder="Monto"><input type="number" class="f-control" id="calcT" placeholder="Tasa %"><input type="number" class="f-control" id="calcP" placeholder="Cuotas"><div id="calcRes" class="summary-box"></div><button class="btn btn-p w-100 mt-2" onclick="APP.calc()">🔢 Calcular</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
    "use strict";

    // ========== SEGURIDAD (objeto corregido) ==========
    const SEC = {
        MAX_ATTEMPTS: 5,
        LOCK_TIME: 900000, // 15 minutos en ms
        SESSION_EXPIRE: 28800000, // 8 horas en ms

        sanitize: function(str) {
            if (!str || typeof str !== 'string') return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        },

        validateInput: function(val, type, max) {
            if (val === null || val === undefined) return '';
            val = String(val).trim();
            if (type === 'text') return val.replace(/[<>{}]/g, '').substring(0, max || 200);
            if (type === 'number') return parseFloat(val.replace(/[^0-9.-]/g, '')) || 0;
            return this.sanitize(val).substring(0, max || 200);
        },

        checkSession: function() {
            var sessionTime = localStorage.getItem('loansw_session_time');
            if (!sessionTime) return false;
            if (Date.now() - parseInt(sessionTime) > this.SESSION_EXPIRE) {
                localStorage.removeItem('loansw_cap');
                localStorage.removeItem('loansw_session_time');
                return false;
            }
            localStorage.setItem('loansw_session_time', Date.now().toString());
            return true;
        },

        isLocked: function() {
            var attempts = JSON.parse(localStorage.getItem('loansw_attempts') || '{"count":0,"time":0}');
            if (attempts.count >= this.MAX_ATTEMPTS) {
                if (Date.now() - attempts.time < this.LOCK_TIME) return true;
                localStorage.setItem('loansw_attempts', JSON.stringify({count:0,time:0}));
            }
            return false;
        },

        recordFailedAttempt: function() {
            var attempts = JSON.parse(localStorage.getItem('loansw_attempts') || '{"count":0,"time":0}');
            attempts.count++;
            attempts.time = Date.now();
            localStorage.setItem('loansw_attempts', JSON.stringify(attempts));
        },

        audit: async function(action, details) {
            try {
                var record = {
                    action: this.sanitize(action),
                    details: this.sanitize(details),
                    timestamp: Date.now()
                };
                var auditLog = JSON.parse(localStorage.getItem('loansw_audit') || '[]');
                auditLog.push(record);
                if (auditLog.length > 1000) auditLog.splice(0, auditLog.length - 1000);
                localStorage.setItem('loansw_audit', JSON.stringify(auditLog));
            } catch(e) {}
        }
    };

    // ========== FORMATO COP ==========
    var COP = new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0,minimumFractionDigits:0});
    var fmoney = function(v) { return COP.format(Math.round(v)); };

    // ========== BASE DE DATOS ==========
    var DB = new Dexie('LoansWSecure');
    DB.version(5).stores({
        cfg:'clave',
        clientes:'++id,nombre,cedula',
        prestamos:'++id,cliente_id,estado',
        cuotas:'++id,prestamo_id,estado,fecha_vencimiento',
        pagos:'++id,prestamo_id,cuota_id,fecha',
        capital:'++id,fecha',
        gastos:'++id,fecha,categoria',
        auditoria:'++id,timestamp'
    });

    // ========== APP SEGURA ==========
    var APP = {
        charts: [],
        dark: false,
        encKey: null,

        init: async function() {
            try {
                await DB.open();
                var pwdHash = await DB.cfg.get('pwd_hash');
                if (!pwdHash) {
                    var defaultHash = await this.hashPassword('admin');
                    await DB.cfg.put({clave:'pwd_hash', valor:defaultHash});
                    await DB.cfg.put({clave:'mora', valor:'5'});
                    await DB.cfg.put({clave:'dark', valor:'false'});
                    await DB.cfg.put({clave:'capital_inicial', valor:'0'});
                }
                var d = await DB.cfg.get('dark');
                if (d && d.valor === 'true') { this.dark = true; document.body.classList.add('dark-mode'); }

                document.getElementById('loginBtn').addEventListener('click', function() { APP.login(); });
                document.getElementById('pwd').addEventListener('keydown', function(e) { if(e.key==='Enter') APP.login(); });
                document.querySelectorAll('.nav-btn').forEach(function(b) {
                    b.addEventListener('click', function() { APP.goto(b.dataset.p); });
                });

                if (SEC.checkSession() && localStorage.getItem('loansw_cap') === 'yes') {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    document.getElementById('main-app').classList.add('show');
                    await SEC.audit('session_resume', 'Sesión reanudada');
                    this.goto('dashboard');
                }
            } catch(e) { console.error('Init error:', e); }
        },

        hashPassword: async function(pwd) {
            var enc = new TextEncoder();
            var salt = crypto.getRandomValues(new Uint8Array(16));
            var key = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveBits']);
            var hash = await crypto.subtle.deriveBits({name:'PBKDF2', salt:salt, iterations:100000, hash:'SHA-256'}, key, 256);
            return JSON.stringify({salt:Array.from(salt), hash:Array.from(new Uint8Array(hash))});
        },

        verifyPassword: async function(pwd, stored) {
            try {
                var data = JSON.parse(stored);
                var salt = data.salt;
                var hash = data.hash;
                var enc = new TextEncoder();
                var key = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveBits']);
                var derived = await crypto.subtle.deriveBits({name:'PBKDF2', salt:new Uint8Array(salt), iterations:100000, hash:'SHA-256'}, key, 256);
                var derivedArray = new Uint8Array(derived);
                var hashArray = new Uint8Array(hash);
                if (derivedArray.length !== hashArray.length) return false;
                for (var i = 0; i < derivedArray.length; i++) { if (derivedArray[i] !== hashArray[i]) return false; }
                return true;
            } catch(e) { return false; }
        },

        login: async function() {
            if (SEC.isLocked()) {
                var lockTime = JSON.parse(localStorage.getItem('loansw_attempts') || '{"time":0}');
                var remaining = Math.ceil((SEC.LOCK_TIME - (Date.now() - lockTime.time)) / 60000);
                document.getElementById('login-locked').style.display = 'block';
                document.getElementById('login-locked').textContent = '⏳ Bloqueado por ' + remaining + ' minuto(s)';
                document.getElementById('loginBtn').disabled = true;
                await SEC.audit('login_blocked', 'Intento durante bloqueo');
                return;
            }
            var pwd = document.getElementById('pwd').value;
            if (!pwd || pwd.length < 1) { document.getElementById('login-err').textContent = 'Ingrese contraseña'; return; }
            if (pwd.length > 128) { document.getElementById('login-err').textContent = 'Contraseña demasiado larga'; return; }
            var stored = await DB.cfg.get('pwd_hash');
            if (!stored) { document.getElementById('login-err').textContent = 'Error del sistema'; return; }
            var ok = await this.verifyPassword(pwd, stored.valor);
            if (ok) {
                localStorage.setItem('loansw_attempts', JSON.stringify({count:0,time:0}));
                localStorage.setItem('loansw_cap', 'yes');
                localStorage.setItem('loansw_session_time', Date.now().toString());
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('main-app').classList.add('show');
                document.getElementById('login-locked').style.display = 'none';
                document.getElementById('loginBtn').disabled = false;
                await SEC.audit('login_success', 'Inicio de sesión exitoso');
                this.goto('dashboard');
            } else {
                SEC.recordFailedAttempt();
                var attempts = JSON.parse(localStorage.getItem('loansw_attempts') || '{"count":0}');
                var remaining = SEC.MAX_ATTEMPTS - attempts.count;
                document.getElementById('login-err').textContent = 'Contraseña incorrecta. Intentos restantes: ' + remaining;
                await SEC.audit('login_failed', 'Intento fallido #' + attempts.count);
                if (remaining <= 0) {
                    document.getElementById('login-locked').style.display = 'block';
                    document.getElementById('login-locked').textContent = '⏳ Demasiados intentos. Espere 15 minutos.';
                    document.getElementById('loginBtn').disabled = true;
                }
            }
        },

        goto: function(p) {
            if (!SEC.checkSession()) { this.logout(); return; }
            document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
            var a = document.querySelector('.nav-btn[data-p="' + p + '"]');
            if (a) a.classList.add('active');
            this.render(p);
            window.scrollTo({top:0,behavior:'smooth'});
        },

        destroyCharts: function() { this.charts.forEach(function(c) { try { c.destroy(); } catch(e) {} }); this.charts = []; },

        toast: function(t, m, ty) {
            var box = document.getElementById('toasts');
            if (!box) return;
            var el = document.createElement('div');
            el.className = 'toast';
            el.style.borderLeftColor = ty === 'success' ? 'var(--success)' : 'var(--primary)';
            el.innerHTML = '<strong>' + SEC.sanitize(t) + '</strong><br><small>' + SEC.sanitize(m) + '</small>';
            box.appendChild(el);
            setTimeout(function() { el.style.opacity = '0'; el.style.transition = '0.3s'; setTimeout(function() { el.remove(); }, 300); }, 2500);
        },

        getCapitalTotal: async function() { var caps = await DB.capital.toArray(); return caps.reduce(function(s,c) { return s + (c.monto||0); }, 0) + parseFloat((await DB.cfg.get('capital_inicial'))?.valor || '0'); },
        getGastosTotal: async function() { var gs = await DB.gastos.toArray(); return gs.reduce(function(s,g) { return s + (g.monto||0); }, 0); },
        getCarteraActiva: async function() { var act = await DB.prestamos.where({estado:'activo'}).toArray(); return act.reduce(function(s,p) { return s + (p.monto||0); }, 0); },
        getCobradoMes: async function() { var now = new Date(); var start = new Date(now.getFullYear(),now.getMonth(),1); var pagos = await DB.pagos.where('fecha').between(start.getTime(),Date.now()).toArray(); return pagos.reduce(function(s,p) { return s + (p.monto||0); }, 0); },
        getInteresMes: async function() { var now = new Date(); var start = new Date(now.getFullYear(),now.getMonth(),1); var pagos = await DB.pagos.where('fecha').between(start.getTime(),Date.now()).toArray(); var inte = 0; for (var i = 0; i < pagos.length; i++) { var cu = await DB.cuotas.get(pagos[i].cuota_id); if (cu && cu.estado === 'pagada') inte += cu.interes || 0; } return inte; },
        getCobradoHistorico: async function() { var pagos = await DB.pagos.toArray(); return pagos.reduce(function(s,p) { return s + (p.monto||0); }, 0); },
        getInteresHistorico: async function() { var pagos = await DB.pagos.toArray(); var inte = 0; for (var i = 0; i < pagos.length; i++) { var cu = await DB.cuotas.get(pagos[i].cuota_id); if (cu) inte += cu.interes || 0; } return inte; },
        getPrestadoHistorico: async function() { var ps = await DB.prestamos.toArray(); return ps.reduce(function(s,p) { return s + (p.monto||0); }, 0); },
        getProyeccionMes: async function() { var now = new Date(); var end = new Date(now.getFullYear(),now.getMonth()+1,0); var cu = await DB.cuotas.where('fecha_vencimiento').between(now.getTime(),end.getTime()).and(function(c) { return c.estado === 'pendiente'; }).toArray(); return cu.reduce(function(s,c) { return s + (c.monto_total||0); }, 0); },
        getProyeccionHoy: async function() { var now = new Date(); var today = new Date(now.getFullYear(),now.getMonth(),now.getDate()); var cu = await DB.cuotas.where('fecha_vencimiento').between(today.getTime(),today.getTime()+86400000).and(function(c) { return c.estado !== 'pagada'; }).toArray(); return cu.reduce(function(s,c) { return s + (c.monto_total||0); }, 0); },
        getGastosMes: async function() { var now = new Date(); var start = new Date(now.getFullYear(),now.getMonth(),1); var gs = await DB.gastos.where('fecha').between(start.getTime(),Date.now()).toArray(); return gs.reduce(function(s,g) { return s + (g.monto||0); }, 0); },

        render: async function(p) {
            this.destroyCharts();
            var c = document.getElementById('page');
            if (!c) return;
            c.innerHTML = '';
            try {
                if (p === 'dashboard') { c.innerHTML = await this.dashHTML(); setTimeout(function() { APP.dashInit(); }, 400); }
                else if (p === 'finanzas') { c.innerHTML = await this.finHTML(); setTimeout(function() { APP.finInit(); }, 400); }
                else if (p === 'clientes') { c.innerHTML = this.cliHTML(); this.cliList(); }
                else if (p === 'prestamos') { c.innerHTML = await this.preHTML(); this.preList(); }
                else if (p === 'reportes') { c.innerHTML = await this.repHTML(); this.initRep(); }
            } catch(e) { c.innerHTML = '<div class="text-center p-4"><h4>Error</h4><p>' + SEC.sanitize(e.message) + '</p></div>'; }
        },

        dashHTML: async function() {
            var capTotal = await this.getCapitalTotal(), gastos = await this.getGastosTotal(), cartera = await this.getCarteraActiva();
            var cobradoHist = await this.getCobradoHistorico(), interesHist = await this.getInteresHistorico();
            var capDisp = capTotal + cobradoHist + interesHist - cartera - gastos;
            var gananciaHist = cobradoHist + interesHist - gastos;
            var proyHoy = await this.getProyeccionHoy(), proyMes = await this.getProyeccionMes();
            var activos = await DB.prestamos.where({estado:'activo'}).count();
            return '<div class="header"><span class="brand">Loans W 🔒</span><div class="header-actions"><button class="btn-icon" onclick="APP.showCalc()">🧮</button><button class="btn-icon" onclick="APP.showConfig()">⚙️</button><button class="btn-icon" onclick="APP.logout()">↩️</button></div></div><div class="stats-grid"><div class="stat-card" onclick="APP.goto(\'finanzas\')"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">🏦</div><div class="stat-label">Capital Disp.</div><div class="stat-value">' + fmoney(capDisp) + '</div></div><div class="stat-card" onclick="APP.goto(\'prestamos\')"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">💵</div><div class="stat-label">Prestado</div><div class="stat-value">' + fmoney(cartera) + '</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">📈</div><div class="stat-label">Ganancia Hist.</div><div class="stat-value text-success">' + fmoney(gananciaHist) + '</div></div><div class="stat-card"><div class="stat-icon" style="background:#fff8e6;color:#f59e0b">📋</div><div class="stat-label">Activos</div><div class="stat-value text-warning">' + activos + '</div></div></div><div class="row g-2 mb-3"><div class="col-6"><div class="card"><div class="card-header">📅 Hoy</div><div class="card-body text-center"><div class="kpi-big text-info">' + fmoney(proyHoy) + '</div></div></div></div><div class="col-6"><div class="card"><div class="card-header">📆 Este Mes</div><div class="card-body text-center"><div class="kpi-big text-success">' + fmoney(proyMes) + '</div></div></div></div></div><div class="card"><div class="card-header">📊 Ganancias Mensuales</div><div class="card-body"><canvas id="chart1"></canvas></div></div><div class="card"><div class="card-header">⏰ Pagos Hoy <span class="badge badge-a" id="todayCnt">0</span></div><div class="card-body" id="todayList"></div></div>';
        },

        dashInit: async function() {
            var now = new Date(), today = new Date(now.getFullYear(),now.getMonth(),now.getDate()), start = new Date(now.getFullYear(),now.getMonth(),1);
            var tp = await DB.pagos.where('fecha').between(today.getTime(),today.getTime()+86400000).toArray();
            var tc = document.getElementById('todayCnt'); if (tc) tc.textContent = tp.length;
            var tl = document.getElementById('todayList');
            if (tl) {
                var th = '';
                for (var i = 0; i < tp.length; i++) {
                    var pr = await DB.prestamos.get(tp[i].prestamo_id);
                    if (!pr) continue;
                    var cl = await DB.clientes.get(pr.cliente_id);
                    th += '<div class="d-flex justify-between py-1"><span>' + SEC.sanitize(cl?.nombre || '?') + '</span><strong class="text-success">+' + fmoney(tp[i].monto || 0) + '</strong></div>';
                }
                tl.innerHTML = th || '<p class="text-muted text-center py-2">Sin pagos hoy</p>';
            }
            var c1 = document.getElementById('chart1');
            if (c1) {
                var meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
                var data = new Array(12).fill(0);
                var pagos = await DB.pagos.toArray();
                for (var j = 0; j < pagos.length; j++) { var m = new Date(pagos[j].fecha).getMonth(); data[m] += pagos[j].monto || 0; }
                var ch = new Chart(c1, {type:'bar',data:{labels:meses,datasets:[{data:data.map(function(v){return Math.round(v);}),backgroundColor:'rgba(108,92,231,0.8)',borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return fmoney(v);}}}}}});
                this.charts.push(ch);
            }
        },

        finHTML: async function() {
            var capTotal = await this.getCapitalTotal(), gastos = await this.getGastosTotal(), cartera = await this.getCarteraActiva();
            var cobradoHist = await this.getCobradoHistorico(), interesHist = await this.getInteresHistorico();
            var capDisp = capTotal + cobradoHist + interesHist - cartera - gastos;
            var gananciaHist = cobradoHist + interesHist - gastos;
            var proyHoy = await this.getProyeccionHoy(), proyMes = await this.getProyeccionMes();
            return '<div class="header"><span class="brand">🏦 Capital & Finanzas</span><div class="header-actions"><button class="btn btn-p btn-xs" onclick="APP.showCapital()">+ Capital</button><button class="btn btn-d btn-xs" onclick="APP.showGasto()">+ Gasto</button></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">🏦</div><div class="stat-label">Capital Disp.</div><div class="stat-value">' + fmoney(capDisp) + '</div></div><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">💵</div><div class="stat-label">Prestado</div><div class="stat-value">' + fmoney(cartera) + '</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">📈</div><div class="stat-label">Recuperado</div><div class="stat-value text-success">' + fmoney(cobradoHist) + '</div></div><div class="stat-card"><div class="stat-icon" style="background:#fff8e6;color:#f59e0b">💎</div><div class="stat-label">Intereses</div><div class="stat-value text-warning">' + fmoney(interesHist) + '</div></div></div><div class="row g-2 mb-3"><div class="col-6"><div class="card"><div class="card-header">📅 Hoy</div><div class="card-body text-center"><div class="kpi-big text-info">' + fmoney(proyHoy) + '</div></div></div></div><div class="col-6"><div class="card"><div class="card-header">📆 Este Mes</div><div class="card-body text-center"><div class="kpi-big text-success">' + fmoney(proyMes) + '</div></div></div></div></div><div class="card"><div class="card-header">📊 Capital vs Préstamos vs Ganancias</div><div class="card-body"><canvas id="chartFin1"></canvas></div></div><div class="card"><div class="card-header">🧾 Últimos Gastos</div><div class="card-body p-0" id="gastosList"></div></div>';
        },

        finInit: async function() {
            var capTotal = await this.getCapitalTotal(), gastos = await this.getGastosTotal(), cartera = await this.getCarteraActiva(), cobradoHist = await this.getCobradoHistorico(), interesHist = await this.getInteresHistorico();
            var c1 = document.getElementById('chartFin1');
            if (c1) {
                var ch = new Chart(c1, {type:'bar',data:{labels:['Capital','Prestado','Ganancia'],datasets:[{data:[Math.round(capTotal),Math.round(cartera),Math.round(cobradoHist+interesHist-gastos)],backgroundColor:['rgba(108,92,231,0.8)','rgba(59,130,246,0.8)','rgba(0,184,148,0.8)'],borderRadius:10}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return fmoney(v);}}}}}});
                this.charts.push(ch);
            }
            var gs = await DB.gastos.toArray();
            gs.sort(function(a,b) { return b.fecha - a.fecha; });
            var gl = document.getElementById('gastosList');
            if (gl) {
                var html = '';
                for (var i = 0; i < Math.min(gs.length, 10); i++) {
                    html += '<div class="list-item"><div class="avatar" style="background:var(--danger)">🧾</div><div class="item-info"><div class="item-name">' + SEC.sanitize(gs[i].categoria || 'Gasto') + ' - ' + fmoney(gs[i].monto || 0) + '</div><div class="item-detail">' + new Date(gs[i].fecha).toLocaleDateString('es-CO') + ' · ' + SEC.sanitize(gs[i].nota || '') + '</div></div></div>';
                }
                gl.innerHTML = html || '<p class="text-muted text-center p-3">Sin gastos</p>';
            }
        },

        calcAmortizacion: function(monto, tasa, tipo, plazo, fechaInicio, frecuencia) {
            var td = tasa / 100;
            var cf, cuotas = [], saldo = monto;
            if (tipo === 'simple') { cf = (monto + monto * td) / plazo; } else { cf = monto * (td / (1 - Math.pow(1 + td, -plazo))); }
            var fi = new Date(fechaInicio);
            for (var i = 1; i <= plazo; i++) {
                var interes = tipo === 'simple' ? (monto * td) / plazo : saldo * td;
                var capital = cf - interes;
                saldo -= capital;
                var fc = new Date(fi);
                switch (frecuencia) {
                    case 'diaria': fc.setDate(fc.getDate() + i - 1); break;
                    case 'semanal': fc.setDate(fc.getDate() + (i-1)*7); break;
                    case 'quincenal': fc.setDate(fc.getDate() + (i-1)*15); break;
                    case 'mensual': fc.setMonth(fc.getMonth() + i - 1); break;
                }
                cuotas.push({numero:i, fecha:new Date(fc), capital:capital, interes:interes, monto_total:capital+interes, saldo_restante:Math.max(0,saldo)});
            }
            return cuotas;
        },

            if (!clienteId) errors.push('Cliente requerido');
            if (!monto || monto < 1000) errors.push('Monto mínimo $1.000');
            if (!tasa || tasa <= 0) errors.push('Tasa requerida');

        saveConfig: async function() {
            var np = document.getElementById('cfgPwd').value;
            if (np && np.length >= 6) { var hash = await this.hashPassword(np); await DB.cfg.put({clave:'pwd_hash', valor:hash}); this.toast('✅','Contraseña actualizada','success'); }
            await DB.cfg.put({clave:'mora', valor:SEC.validateInput(document.getElementById('cfgMora').value, 'number')});
            this.dark = document.getElementById('cfgDark').checked;
            await DB.cfg.put({clave:'dark', valor:String(this.dark)});
            document.body.classList.toggle('dark-mode', this.dark);
            bootstrap.Modal.getInstance(document.getElementById('modConfig')).hide();
            await SEC.audit('config_changed', 'Configuración actualizada');
            if (!np) this.toast('✅','Guardado','success');
        },
        showCalc: function() { new bootstrap.Modal(document.getElementById('modCalc')).show(); },
        calc: function() {
            var m = SEC.validateInput(document.getElementById('calcM').value, 'number');
            var t = SEC.validateInput(document.getElementById('calcT').value, 'number');
            var p = parseInt(document.getElementById('calcP').value) || 0;
            if (!m || !t || !p) return;
            var cf = (m + m * (t/100)) / p;
            document.getElementById('calcRes').innerHTML = '<p><strong>Cuota:</strong> ' + fmoney(cf) + '</p><p><strong>Total:</strong> ' + fmoney(cf*p) + '</p><p><strong>Interés:</strong> ' + fmoney((cf*p)-m) + '</p>';
        },
        exportBD: async function() {
            var data = {clientes:await DB.clientes.toArray(), prestamos:await DB.prestamos.toArray(), cuotas:await DB.cuotas.toArray(), pagos:await DB.pagos.toArray(), capital:await DB.capital.toArray(), gastos:await DB.gastos.toArray()};
            var json = JSON.stringify(data);
            var blob = new Blob([json], {type:'application/json'});
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'LoansW_Backup_' + new Date().toISOString().slice(0,10) + '.json';
            a.click();
            URL.revokeObjectURL(a.href);
            await SEC.audit('backup_exported', 'Base de datos exportada');
            this.toast('✅','BD exportada','success');
        },
        importBD: function(e) {
            var f = e.target.files[0];
            if (!f || !f.name.match(/\.(json|lwenc)$/)) return this.toast('Error','Formato no válido','danger');
            var r = new FileReader();
            r.onload = async function(ev) {
                try {
                    var d = JSON.parse(ev.target.result);
                    if (!d.clientes || !d.prestamos) throw new Error('Datos inválidos');
                    await DB.clientes.clear(); await DB.prestamos.clear(); await DB.cuotas.clear(); await DB.pagos.clear(); await DB.capital.clear(); await DB.gastos.clear();
                    if (d.clientes) await DB.clientes.bulkAdd(d.clientes);
                    if (d.prestamos) await DB.prestamos.bulkAdd(d.prestamos);
                    if (d.cuotas) await DB.cuotas.bulkAdd(d.cuotas);
                    if (d.pagos) await DB.pagos.bulkAdd(d.pagos);
                    if (d.capital) await DB.capital.bulkAdd(d.capital);
                    if (d.gastos) await DB.gastos.bulkAdd(d.gastos);
                    await SEC.audit('backup_imported', 'Base de datos restaurada');
                    APP.toast('✅','Restaurado','success');
                    APP.goto('dashboard');
                } catch(err) { APP.toast('Error','Archivo corrupto','danger'); }
            };
            r.readAsText(f);
            e.target.value = '';
        },
        logout: async function() {
            await SEC.audit('logout', 'Sesión cerrada');
            localStorage.removeItem('loansw_cap');
            localStorage.removeItem('loansw_session_time');
            location.reload();
        }
    };

    document.addEventListener('DOMContentLoaded', function() { APP.init(); });
    </script>
</body>
</html>
