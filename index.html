<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6c5ce7">
    <title>Loans W - LWI v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --bg: #f0f2ff;
            --card: #ffffff;
            --text: #1e1e2e;
            --sub: #5a5a7a;
            --border: #e2e4f0;
            --primary: #6c5ce7;
            --primary-dark: #5a4fd4;
            --primary-light: #8B5CF6;
            --success: #00b894;
            --danger: #ff6b6b;
            --warning: #f59e0b;
            --info: #3b82f6;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.06);
            --radius: clamp(0.6rem, 2vw, 1rem);
            --radius-lg: 22px;
            --font-xs: clamp(0.55rem, 1.4vw, 0.68rem);
            --font-sm: clamp(0.65rem, 1.6vw, 0.8rem);
            --font-md: clamp(0.75rem, 1.9vw, 0.9rem);
            --font-lg: clamp(0.9rem, 2.3vw, 1.2rem);
            --font-xl: clamp(1.2rem, 3vw, 1.8rem);
            --spacing-xs: clamp(0.2rem, 0.6vw, 0.4rem);
            --spacing-sm: clamp(0.4rem, 1vw, 0.6rem);
            --spacing-md: clamp(0.6rem, 1.5vw, 0.9rem);
            --spacing-lg: clamp(0.8rem, 2vw, 1.2rem);
            --ease-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-blur: blur(30px);
            --nav-bg: rgba(255, 255, 255, 0.95);
        }

        /* ===== MODO OSCURO PREMIUM ===== */
        .dark-mode {
            --bg: #09090F;
            --card: #16192B;
            --text: #FFFFFF;
            --sub: #A7B0D4;
            --border: rgba(255, 255, 255, 0.05);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
            --glass-bg: rgba(22, 25, 43, 0.92);
            --glass-border: rgba(255, 255, 255, 0.05);
            --nav-bg: rgba(22, 25, 43, 0.92);
            
            /* Colores ajustados para modo oscuro */
            --primary: #8B5CF6;
            --primary-dark: #6C5CE7;
            --primary-light: #A78BFA;
            --success: #00C853;
            --danger: #FF5252;
            --info: #3B82F6;
            --warning: #FFB300;
        }

        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
            height: -webkit-fill-available;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            padding-top: var(--sat);
            padding-bottom: var(--sab);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ===== ANIMACIONES ===== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(108, 92, 231, 0.3); }
            50% { box-shadow: 0 0 40px rgba(108, 92, 231, 0.6); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatParticle {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.2; }
            80% { opacity: 0.12; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        @keyframes ripple-effect {
            to { transform: scale(4); opacity: 0; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== UTILIDADES DE ANIMACIÓN ===== */
        .anim-fade { animation: fadeIn 0.35s ease forwards; }
        .anim-up { animation: fadeUp 0.4s var(--ease-smooth) forwards; }
        .anim-down { animation: fadeDown 0.35s var(--ease-smooth) forwards; }
        .anim-scale { animation: scaleIn 0.3s var(--ease-smooth) forwards; }
        .anim-float { animation: float 4s ease-in-out infinite; }
        .anim-glow { animation: glow 3s ease-in-out infinite; }
        .anim-slide-up { animation: slideUp 0.4s var(--ease-smooth) forwards; }
        .anim-slide-down { animation: slideDown 0.4s var(--ease-smooth) forwards; }

        .stagger>* {
            opacity: 0;
            animation: fadeUp 0.3s var(--ease-smooth) forwards;
        }
        .stagger>*:nth-child(1) { animation-delay: 0.02s; }
        .stagger>*:nth-child(2) { animation-delay: 0.05s; }
        .stagger>*:nth-child(3) { animation-delay: 0.08s; }
        .stagger>*:nth-child(4) { animation-delay: 0.11s; }
        .stagger>*:nth-child(5) { animation-delay: 0.14s; }

        /* ===== LOGIN ===== */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #09090F 0%, #101224 25%, #171A33 50%, #1D1845 75%, #09090F 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 9999;
            padding: var(--spacing-sm);
            overflow: hidden;
        }

        .dark-mode #login-screen {
            background: linear-gradient(135deg, #09090F 0%, #101224 25%, #171A33 50%, #1D1845 75%, #09090F 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            font-size: 1.4rem;
            opacity: 0;
            animation: floatParticle 7s ease-in-out infinite;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            width: min(100%, 22rem);
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(108, 92, 231, 0.15);
            animation: scaleIn 0.5s var(--ease-smooth);
            position: relative;
            z-index: 1;
            border: 1px solid var(--glass-border);
        }

        .login-logo {
            width: 4.8rem;
            height: 4.8rem;
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6, #A78BFA);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite, glow 3s ease-in-out infinite, float 4s ease-in-out infinite;
            border-radius: 1.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            color: #fff;
            margin-bottom: var(--spacing-sm);
            box-shadow: 0 10px 40px rgba(108, 92, 231, 0.5);
            position: relative;
        }

        .login-logo::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 1.6rem;
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
            opacity: 0.3;
            filter: blur(15px);
            z-index: -1;
        }

        .login-card h3 {
            font-weight: 800;
            margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: var(--font-xl);
        }

        .login-card p {
            color: var(--sub);
            margin-bottom: var(--spacing-sm);
            font-size: var(--font-xs);
        }

        .login-input {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.9rem;
            padding: 0.85rem 1rem;
            font-size: var(--font-md);
            width: 100%;
            margin-bottom: 0.6rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            outline: none;
            transition: all var(--ease-smooth);
        }

        .dark-mode .login-input {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .login-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15), 0 0 20px rgba(108, 92, 231, 0.1);
            transform: translateY(-2px);
        }

        .login-input::placeholder {
            color: var(--sub);
            opacity: 0.6;
        }

        .login-btn {
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            color: #fff;
            border: none;
            border-radius: 0.9rem;
            padding: 0.85rem;
            font-size: var(--font-md);
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: all var(--ease-smooth);
            letter-spacing: 0.4px;
            box-shadow: 0 6px 25px rgba(108, 92, 231, 0.4);
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(108, 92, 231, 0.6), 0 0 30px rgba(108, 92, 231, 0.2);
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .ripple-container {
            position: relative;
            overflow: hidden;
        }

        .ripple-effect-el {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-effect 0.6s ease-out;
            pointer-events: none;
        }

        /* ===== MAIN APP ===== */
        #main-app {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 100vh;
        }

        #main-app.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .app-wrap {
            flex: 1;
            width: min(100%, 75rem);
            margin: 0 auto;
            padding: var(--spacing-md);
            padding-bottom: calc(5rem + var(--sab) + var(--spacing-md));
        }

        /* ===== HEADER ===== */
        .header {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-sm) var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border);
            position: sticky;
            top: calc(var(--sat) + var(--spacing-xs));
            z-index: 40;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            flex-wrap: wrap;
            gap: var(--spacing-xs);
            animation: fadeDown 0.35s var(--ease-smooth);
            transition: all 0.3s ease;
        }

        .dark-mode .header {
            background: var(--card);
            border-color: var(--border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .header:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .dark-mode .header:hover {
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.1);
            border-color: rgba(108, 92, 231, 0.3);
        }

        .brand {
            font-size: var(--font-lg);
            font-weight: 800;
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-xs);
        }

        .btn-icon {
            width: 2.4rem;
            height: 2.4rem;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: all var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }

        .dark-mode .btn-icon {
            background: rgba(255, 255, 255, 0.05);
            color: var(--sub);
        }

        .btn-icon:hover {
            background: rgba(108, 92, 231, 0.15);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }

        .dark-mode .btn-icon:hover {
            background: rgba(108, 92, 231, 0.2);
            color: #fff;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
        }

        /* ===== STATS GRID ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        @media(min-width: 35rem) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            cursor: pointer;
            min-width: 0;
            transition: all var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }

        .dark-mode .stat-card {
            background: var(--card);
            border-color: var(--border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .dark-mode .stat-card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(108, 92, 231, 0.3);
            transform: translateY(-4px);
        }

        .stat-icon {
            width: 2.8rem;
            height: 2.8rem;
            border-radius: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: var(--spacing-xs);
            transition: all var(--ease-smooth);
        }

        .dark-mode .stat-icon {
            background: rgba(108, 92, 231, 0.15) !important;
            color: var(--primary) !important;
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.06) rotate(-2deg);
        }

        .stat-label {
            font-size: var(--font-xs);
            color: var(--sub);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: var(--font-xl);
            font-weight: 800;
            margin-top: 0.1rem;
            line-height: 1.2;
        }

        .stat-trend {
            font-size: var(--font-xs);
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 0.2rem;
            margin-top: 0.2rem;
        }

        .stat-trend.down {
            color: var(--danger);
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: var(--spacing-md);
            overflow: hidden;
            width: 100%;
            transition: all var(--ease-smooth);
        }

        .dark-mode .card {
            background: var(--card);
            border-color: var(--border);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
        }

        .card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
            border-color: rgba(108, 92, 231, 0.15);
        }

        .dark-mode .card:hover {
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            border-color: rgba(108, 92, 231, 0.2);
        }

        .card-header {
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: var(--font-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-body {
            padding: var(--spacing-sm) var(--spacing-md);
        }

        /* ===== BADGES ===== */
        .badge {
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: var(--font-xs);
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: 0.3px;
            transition: all var(--ease-smooth);
        }

        .badge-a {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.15), rgba(139, 92, 246, 0.15));
            color: var(--primary);
        }

        .badge-l {
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.15), rgba(255, 82, 82, 0.15));
            color: var(--danger);
            animation: pulse 2s ease-in-out infinite;
        }

        .badge-p {
            background: linear-gradient(135deg, rgba(0, 200, 83, 0.15), rgba(0, 200, 83, 0.15));
            color: var(--success);
        }

        .badge-w {
            background: linear-gradient(135deg, rgba(255, 179, 0, 0.15), rgba(255, 179, 0, 0.15));
            color: var(--warning);
        }

        .dark-mode .badge-a {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.2), rgba(139, 92, 246, 0.2));
            color: #A78BFA;
        }

        .dark-mode .badge-l {
            background: linear-gradient(135deg, rgba(255, 82, 82, 0.2), rgba(255, 82, 82, 0.2));
            color: #FF8A8A;
        }

        .dark-mode .badge-p {
            background: linear-gradient(135deg, rgba(0, 200, 83, 0.2), rgba(0, 200, 83, 0.2));
            color: #69F0AE;
        }

        .dark-mode .badge-w {
            background: linear-gradient(135deg, rgba(255, 179, 0, 0.2), rgba(255, 179, 0, 0.2));
            color: #FFD54F;
        }

        /* ===== BOTONES ===== */
        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: var(--font-xs);
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            white-space: nowrap;
            transition: all var(--ease-smooth);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-p {
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-p:hover {
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.5);
            background: linear-gradient(135deg, #7C6CF7, #9B6CF6);
        }

        .btn-s {
            background: linear-gradient(135deg, #00C853, #69F0AE);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
        }

        .btn-s:hover {
            box-shadow: 0 8px 30px rgba(0, 200, 83, 0.5);
        }

        .btn-d {
            background: linear-gradient(135deg, #FF5252, #FF8A8A);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.3);
        }

        .btn-d:hover {
            box-shadow: 0 8px 30px rgba(255, 82, 82, 0.5);
        }

        .btn-o {
            border: 2px solid var(--primary);
            color: var(--primary);
            background: transparent;
        }

        .btn-o:hover {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-xs {
            padding: 0.2rem 0.6rem;
            font-size: 0.55rem;
        }

        .btn-wa {
            background: #25D366;
            color: #fff;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-wa:hover {
            box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
            background: #20BD5A;
        }

        .btn-sm {
            padding: 0.3rem 0.9rem;
            font-size: var(--font-xs);
        }

        /* ===== NAVEGACIÓN INFERIOR ===== */
        .nav {
            position: fixed;
            bottom: calc(var(--sab) + var(--spacing-xs));
            left: 50%;
            transform: translateX(-50%);

            justify-content: space-around;
            padding: var(--spacing-xs) var(--spacing-sm);

            border-radius: 30px;
            border: 1px solid var(--border);
            width: min(98%, 34rem);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            animation: fadeUp 0.4s var(--ease-smooth);
        }

        .dark-mode .nav {
            background: var(--nav-bg);
            border-color: var(--border);
            box-shadow: 0 -4px 30px rgba(0, 0, 0, 0.5);
        }

        @media(min-width: 48rem) {

                display: none;
            }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.5rem;
            color: var(--sub);
            border: none;
            background: none;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 1.5rem;
            font-weight: 600;
            transition: all var(--ease-smooth);
            position: relative;
        }

        .nav-btn i {
            font-size: 1.2rem;
            margin-bottom: 1px;
            transition: all var(--ease-smooth);
        }

        .nav-btn.active {
            color: var(--primary);
            font-weight: 700;

            transform: scale(1.1);
        }

        .nav-btn.active::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);

        /* ===== GRÁFICOS ===== */

        /* ===== LISTAS ===== */

        }

            height: 2.4rem;

            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;

            box-shadow: 0 3px 12px rgba(108, 92, 231, 0.2);
        }

        .dark-mode .avatar-sm {
            box-shadow: 0 3px 15px rgba(108, 92, 231, 0.3);
        }

        .list-item:hover .avatar-sm {
            transform: scale(1.08) rotate(3deg);
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
        }

        /* ===== TOASTS ===== */
        .toast-box {
            position: fixed;
            top: calc(var(--sat) + var(--spacing-sm));
            right: var(--spacing-sm);
            z-index: 9999;
            max-width: 90vw;
        }

        .toast {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: var(--spacing-sm) var(--spacing-md);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            margin-bottom: var(--spacing-xs);
            font-weight: 600;
            font-size: var(--font-xs);
            border-left: 4px solid var(--primary);
            animation: fadeUp 0.3s var(--ease-smooth);
        }

            background: var(--card);
            border-color: var(--border);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        }

        /* ===== UTILIDADES ===== */
        .text-success { color: var(--success) !important; }
        .text-danger { color: var(--danger) !important; }
        .text-warning { color: var(--warning) !important; }
        .text-info { color: var(--info) !important; }
        .text-muted { color: var(--sub) !important; }
        .d-flex { display: flex; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .fw-bold { font-weight: 700; }
        .mb-1 { margin-bottom: 0.25rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-3 { margin-bottom: 0.75rem; }
        .mt-2 { margin-top: 0.5rem; }
        .w-100 { width: 100%; }
        .p-2 { padding: 0.5rem; }

        .row {
            display: flex;
            flex-wrap: wrap;
        }

        .col-6 {
            flex: 0 0 50%;

        }

        .table-responsive {

        }

        .f-control {

            background: var(--card);

        }

        .progress {
            height: 6px;
            border-radius: 6px;
            background: var(--border);

        }

        .dark-mode .progress {
            background: rgba(255, 255, 255, 0.05);
        }

        .progress-bar {
            height: 100%;
            border-radius: 6px;
            transition: width 0.8s ease;
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
        }

        /* ===== CONFIGURACIÓN ===== */
        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-sm) 0;
            border-bottom: 1px solid var(--border);
        }

        .dark-mode .config-item {
            border-color: rgba(255, 255, 255, 0.05);
        }

        .config-item:last-child {
            border-bottom: none;
        }

        .toggle-switch {
            width: 48px;
            height: 28px;
            background: var(--border);
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: all var(--ease-smooth);
            flex-shrink: 0;
        }

        .dark-mode .toggle-switch {
            background: rgba(255, 255, 255, 0.1);
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, #6C5CE7, #8B5CF6);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: all var(--ease-smooth);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch.active::after {
            transform: translateX(20px);
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 6px;
        }

        .dark-mode ::-webkit-scrollbar-thumb {
            background: rgba(108, 92, 231, 0.5);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
            
            .stat-card {

            }
            
            .stat-icon {
                width: 2.2rem;
                height: 2.2rem;
                font-size: 1rem;
            }
            
            .stat-value {
                font-size: var(--font-lg);
            }
        }

        @media (min-width: 768px) {
            .app-wrap {
                padding: var(--spacing-lg);
                padding-bottom: calc(5rem + var(--sab) + var(--spacing-lg));
            }
        }

        /* ===== SPINNER ===== */
        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* ===== MODO CLARO ===== */
        @media (prefers-color-scheme: light) {
            :root:not(.dark-mode) {
                --bg: #f0f2ff;
                --card: #ffffff;
                --text: #1e1e2e;
                --sub: #5a5a7a;
                --border: #e2e4f0;
                --shadow: 0 2px 10px rgba(0, 0, 0, 0.06);
            }
        }

        /* Estilos de configuración extra */
        .config-section {
            margin-top: var(--spacing-md);
        }

        .config-section-title {
            font-size: var(--font-sm);
            font-weight: 700;
            color: var(--sub);
            margin-bottom: var(--spacing-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.4rem;
        }
    </style>
</head>
<body>
    <!-- ===== LOGIN ===== -->
    <div id="login-screen">

    <!-- ===== MAIN APP ===== -->
    <div id="main-app">
        <div class="app-wrap" id="page">
            <div class="text-center" style="padding:2.5rem;color:var(--sub)">Cargando...</div>

    <!-- ===== TOASTS ===== -->

    <!-- ===== MODALES ===== -->

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    "use strict";

    // ============================================================
    // 1. PARTICULAS DE LOGIN
    // ============================================================
    (function() {
        var icons = ['💰', '💵', '💎', '📊', '🧠', '⭐'];
        var c = document.getElementById('particles');
        if (c) {
            for (var i = 0; i < 18; i++) {
                var p = document.createElement('span');
                p.className = 'particle';
                p.textContent = icons[Math.floor(Math.random() * icons.length)];
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 7 + 's';
                p.style.animationDuration = (5 + Math.random() * 7) + 's';
                c.appendChild(p);
            }
        }
    })();

    // ============================================================
    // 2. RIPPLE EFFECT
    // ============================================================
    document.addEventListener('click', function(e) {
        var btn = e.target.closest('.btn, .btn-icon, .login-btn, .nav-btn');
        if (btn) {
            var ripple = document.createElement('span');
            ripple.className = 'ripple-effect-el';
            var rect = btn.getBoundingClientRect();
            var size = Math.max(rect.width, rect.height);
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
            ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
            btn.appendChild(ripple);
            setTimeout(function() { ripple.remove(); }, 600);
        }
    });

    // ============================================================
    // 3. UTILIDADES
    // ============================================================
    var COP = new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        maximumFractionDigits: 0,
        minimumFractionDigits: 0
    });
    var fmoney = function(v) { return COP.format(Math.round(v || 0)); };
    var sanitize = function(s) {
        if (!s || typeof s !== 'string') return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    };

    // ============================================================

    var DB = new Dexie('LoansWLWIv13');
    DB.version(5).stores({

    // ============================================================

        // ============================================================

        // ============================================================
        // 5.2 SEGURIDAD
        // ============================================================
        hashPwd: async function(p) {
            var e = new TextEncoder();
            var s = crypto.getRandomValues(new Uint8Array(16));
            var k = await crypto.subtle.importKey('raw', e.encode(p), 'PBKDF2', false, ['deriveBits']);
            var h = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: s, iterations: 100000, hash: 'SHA-256' }, k, 256);
            return JSON.stringify({ salt: Array.from(s), hash: Array.from(new Uint8Array(h)) });
        },

        verifyPwd: async function(p, st) {
            try {
                var d = JSON.parse(st);
                var s = d.salt,
                    h = d.hash;
                var e = new TextEncoder();
                var k = await crypto.subtle.importKey('raw', e.encode(p), 'PBKDF2', false, ['deriveBits']);
                var de = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: new Uint8Array(s), iterations: 100000,
                    hash: 'SHA-256' }, k, 256);
                var da = new Uint8Array(de);
                var ha = new Uint8Array(h);
                if (da.length !== ha.length) return false;
                for (var i = 0; i < da.length; i++) {
                    if (da[i] !== ha[i]) return false;
                }
                return true;
            } catch (e) { return false; }
        },

        login: async function() {
            var p = document.getElementById('pwd').value;
            if (!p) {
                document.getElementById('login-err').textContent = 'Ingrese contraseña';
                return;
            }
            var s = await DB.cfg.get('pwd_hash');
            if (!s) return;
            if (await this.verifyPwd(p, s.valor)) {
                localStorage.setItem('loansw_lwiv13', 'yes');
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('main-app').classList.add('show');
                this.goto('dashboard');
            } else {
                document.getElementById('login-err').textContent = 'Contraseña incorrecta';
            }
        },

        importData: function() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = async function(e) {
                var file = e.target.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = async function(ev) {
                    try {
                        var data = JSON.parse(ev.target.result);
                        if (!data.clientes || !data.prestamos) {
                            APP.toast('❌', 'Archivo inválido', 'danger');
                            return;
                        }
                        if (!confirm('⚠️ Esto reemplazará todos los datos actuales. ¿Continuar?')) return;
                        await DB.clientes.clear();
                        await DB.prestamos.clear();
                        await DB.cuotas.clear();
                        await DB.pagos.clear();
                        await DB.capital.clear();
                        await DB.gastos.clear();
                        await DB.clientes.bulkAdd(data.clientes);
                        await DB.prestamos.bulkAdd(data.prestamos);
                        await DB.cuotas.bulkAdd(data.cuotas);
                        await DB.pagos.bulkAdd(data.pagos);
                        if (data.capital) await DB.capital.bulkAdd(data.capital);
                        if (data.gastos) await DB.gastos.bulkAdd(data.gastos);
                        APP.toast('✅', 'Datos importados correctamente', 'success');
                        APP.goto(APP._currentPage);
                    } catch (err) {
                        APP.toast('❌', 'Error al importar: ' + err.message, 'danger');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        },

        // ============================================================
        // 5.6 DATOS Y MÉTRICAS
        // ============================================================
        getData: async function() {
            return {
                clientes: await DB.clientes.toArray(),
                prestamos: await DB.prestamos.toArray(),
                cuotas: await DB.cuotas.toArray(),
                pagos: await DB.pagos.toArray(),
                capital: await DB.capital.toArray(),
                gastos: await DB.gastos.toArray(),
                capInicial: parseFloat((await DB.cfg.get('capital_inicial'))?.valor || '0'),
                now: new Date()
            };
        },

        getMetrics: function(d) {
            var capTotal = d.capital.reduce(function(s, c) { return s + (c.monto || 0); }, 0) + d.capInicial;
            var gastosTotal = d.gastos.reduce(function(s, g) { return s + (g.monto || 0); }, 0);
            var cartera = d.prestamos.filter(function(p) { return p.estado === 'activo'; }).reduce(function(s, p) { return s +
                    (p.monto || 0); }, 0);
            var cobradoHist = d.pagos.reduce(function(s, p) { return s + (p.monto || 0); }, 0);
            var interesHist = 0;
            for (var i = 0; i < d.pagos.length; i++) {
                for (var j = 0; j < d.cuotas.length; j++) {
                    if (d.cuotas[j].id === d.pagos[i].cuota_id) {
                        interesHist += d.cuotas[j].interes || 0;
                        break;
                    }
                }
            }
            var disp = capTotal + cobradoHist + interesHist - cartera - gastosTotal;
            var ganancia = cobradoHist + interesHist - gastosTotal;
            var moraMonto = 0,
                moraSet = new Set();
            for (var k = 0; k < d.cuotas.length; k++) {
                if (d.cuotas[k].estado === 'atrasada') {
                    moraMonto += d.cuotas[k].monto_total || 0;
                    var p2 = d.prestamos.find(function(x) { return x.id === d.cuotas[k].prestamo_id; });
                    if (p2) moraSet.add(p2.cliente_id);
                }
            }
            var prestadoHist = d.prestamos.reduce(function(s, p) { return s + (p.monto || 0); }, 0);
            var activos = d.prestamos.filter(function(p) { return p.estado === 'activo'; }).length;
            var hoy = new Date(d.now.getFullYear(), d.now.getMonth(), d.now.getDate());
            var semana = new Date(hoy.getTime() + 7 * 86400000);
            var finMes = new Date(d.now.getFullYear(), d.now.getMonth() + 1, 0);
            var proyHoy = 0,
                proySemana = 0,
                proyMes = 0;
            for (var l = 0; l < d.cuotas.length; l++) {
                var c2 = d.cuotas[l];
                if (c2.estado === 'pagada') continue;
                if (c2.fecha_vencimiento >= hoy.getTime() && c2.fecha_vencimiento < hoy.getTime() + 86400000)
                    proyHoy += c2.monto_total || 0;
                if (c2.fecha_vencimiento >= d.now.getTime() && c2.fecha_vencimiento <= semana.getTime() && c2.estado ===
                    'pendiente')
                    proySemana += c2.monto_total || 0;
                if (c2.fecha_vencimiento >= d.now.getTime() && c2.fecha_vencimiento <= finMes.getTime() && c2.estado ===
                    'pendiente')
                    proyMes += c2.monto_total || 0;
            }
            return {
                capTotal: capTotal,
                gastos: gastosTotal,
                cartera: cartera,
                cobradoHist: cobradoHist,
                interesHist: interesHist,
                disp: disp,
                ganancia: ganancia,
                moraMonto: moraMonto,
                moraClientes: moraSet.size,
                activos: activos,
                clientesTotal: d.clientes.length,
                prestadoHist: prestadoHist,
                proyHoy: proyHoy,
                proySemana: proySemana,
                proyMes: proyMes
            };
        },

        calcSalud: function(m) {
            var score = 0;
            if (m.capTotal > 0) score += Math.min((m.disp / (m.capTotal + 1)) * 25, 20);
            if (m.cartera > 0) score += Math.max(0, 20 - ((m.moraMonto / (m.cartera + 1)) * 20));
            if (m.capTotal > 0) score += Math.min((m.ganancia / (m.capTotal + 1)) * 150, 18);
            if (m.capTotal + m.cartera > 0) score += Math.min((m.cobradoHist / (m.capTotal + m.cartera + 1)) * 50, 14);
            if (m.clientesTotal > 0) score += Math.min((m.activos / (m.clientesTotal + 1)) * 10, 10);
            return Math.max(5, Math.min(98, Math.round(score)));
        },

        // ============================================================
        // 5.9 LWI - MOTOR DE INTELIGENCIA
        // ============================================================
        lwiHTML: async function() {
            var d = await this.getData(),
                m = this.getMetrics(d);
            var score = this.calcSalud(m);
            var color = score >= 75 ? '#00C853' : score >= 50 ? '#FFB300' : '#FF5252';
            var salud = score >= 90 ? 'Excelente' : score >= 75 ? 'Saludable' : score >= 50 ? 'Regular' : 'Riesgo';

            var recs = [];
            if (m.disp > m.cartera && m.cartera > 0) {
                var prom = m.cartera / (m.activos || 1);
                var cant = Math.floor(m.disp / (prom || 1));
                if (cant > 0) recs.push('✅ Puedes otorgar ~' + cant + ' préstamos más de ' + fmoney(prom) + ' c/u.');
            }
            if (m.cartera > 0) {
                var moraP = Math.round((m.moraMonto / (m.cartera + 1)) * 100);
                if (moraP > 25) recs.push('🚨 Más del ' + moraP + '% de tu cartera está en mora.');
            }
            if (m.disp > m.cartera * 2) recs.push('💰 Capital inmovilizado: ' + fmoney(m.disp));
            if (m.disp < m.cartera * 0.3 && m.cartera > 0) recs.push('⚠️ Liquidez baja: ' + fmoney(m.disp));
            if (m.ganancia > 0) recs.push('📊 Rentabilidad: ' + Math.round((m.ganancia / (m.capTotal + 1)) * 100) + '%');

            // Clasificación de clientes
            var clientes = [];
            for (var i = 0; i < d.clientes.length; i++) {
                var cl = d.clientes[i];
                var ps = d.prestamos.filter(function(p) { return p.cliente_id === cl.id; });
                if (ps.length === 0) continue;
                var total = ps.reduce(function(s, p) { return s + (p.monto || 0); }, 0);
                var cuotas = [];
                for (var j = 0; j < ps.length; j++) {
                    cuotas = cuotas.concat(d.cuotas.filter(function(c) { return c.prestamo_id === ps[j].id; }));
                }
                var pagadas = cuotas.filter(function(c) { return c.estado === 'pagada'; }).length;
                var punt = cuotas.length > 0 ? Math.round((pagadas / cuotas.length) * 100) : 0;
                var sc = punt * 0.5 + Math.min(total / 100000, 100) * 0.2 + ps.length * 5;
                clientes.push({
                    nombre: cl.nombre,
                    total: total,
                    prestamos: ps.length,
                    puntualidad: punt,
                    score: Math.round(sc),
                    nivel: sc >= 85 ? '⭐ Platino' : sc >= 65 ? '🥇 Oro' : sc >= 45 ? '🥈 Plata' : sc >= 25 ?
                        '🥉 Bronce' : '🚨 Riesgoso'
                });
            }
            clientes.sort(function(a, b) { return b.score - a.score; });

            // Cobranza
            var cobranza = [];
            for (var k = 0; k < d.cuotas.length; k++) {
                var cu = d.cuotas[k];
                if (cu.estado !== 'atrasada') continue;
                var p = d.prestamos.find(function(x) { return x.id === cu.prestamo_id; });
                if (!p) continue;

        calcAmortizacion: function(monto, tasa, tipo, plazo, fechaInicio, frecuencia) {
            var td = tasa / 100;
            var cf, cuotas = [],
                saldo = monto;
            if (tipo === 'simple') {
                cf = (monto + monto * td) / plazo;
            } else {
                cf = monto * (td / (1 - Math.pow(1 + td, -plazo)));
            }
            var fi = new Date(fechaInicio);
            for (var i = 1; i <= plazo; i++) {
                var inte = tipo === 'simple' ? (monto * td) / plazo : saldo * td;
                var cap = cf - inte;
                saldo -= cap;
                var fc = new Date(fi);
                switch (frecuencia) {
                    case 'diaria':
                        fc.setDate(fc.getDate() + i - 1);
                        break;
                    case 'semanal':
                        fc.setDate(fc.getDate() + (i - 1) * 7);
                        break;
                    case 'quincenal':
                        fc.setDate(fc.getDate() + (i - 1) * 15);
                        break;
                    case 'mensual':
                        fc.setMonth(fc.getMonth() + i - 1);
                        break;
                }
                cuotas.push({
                    numero: i,
                    fecha: new Date(fc),
                    capital: cap,
                    interes: inte,
                    monto_total: cap + inte,
                    saldo_restante: Math.max(0, saldo)
                });
            }
            return cuotas;
        },

        updateLoanPreview: function() {
            var monto = parseFloat(document.getElementById('pmonto').value) || 0;
            var tasa = parseFloat(document.getElementById('ptasa').value) || 0;
            var plazo = parseInt(document.getElementById('pcuotas').value) || 0;
            var tipo = document.getElementById('ptipo').value;
            var fecha = document.getElementById('pfecha').value;
            var frecuencia = document.getElementById('pfrec').value;
            var clienteId = document.getElementById('pcli').value;
            var errEl = document.getElementById('loan-error');
            var summaryEl = document.getElementById('loan-summary');
            var amortEl = document.getElementById('amort-vista');
            var btnEl = document.getElementById('btnCreateLoan');

            var errors = [];
            if (!clienteId) errors.push('Seleccione un cliente');
            if (!monto || monto < 1000) errors.push('Monto mínimo $1.000');
            if (!tasa || tasa <= 0) errors.push('Ingrese una tasa válida');
            if (!plazo || plazo < 1) errors.push('Ingrese número de cuotas');
            if (!fecha) errors.push('Seleccione fecha');

            if (errors.length > 0) {
                errEl.style.display = 'block';
                errEl.textContent = '❌ ' + errors.join(' | ');
                summaryEl.style.display = 'none';
                amortEl.style.display = 'none';
                btnEl.disabled = true;
                return;
            }

            errEl.style.display = 'none';
            btnEl.disabled = false;

            var cuotas = this.calcAmortizacion(monto, tasa, tipo, plazo, fecha, frecuencia);
            var totalInteres = cuotas.reduce(function(s, c) { return s + c.interes; }, 0);
            var totalPagar = cuotas.reduce(function(s, c) { return s + c.monto_total; }, 0);
            var cuotaValor = cuotas[0]?.monto_total || 0;
            var fechaFin = cuotas[cuotas.length - 1]?.fecha || new Date();

            summaryEl.style.display = 'block';
            document.getElementById('summary-content').innerHTML = `
                <div class="row"><div class="col-6"><p>Monto prestado:</p></div><div class="col-6 text-end"><p><strong>${fmoney(monto)}</strong></p></div></div>
                <div class="row"><div class="col-6"><p>Interés total:</p></div><div class="col-6 text-end"><p style="color:var(--warning)">${fmoney(totalInteres)}</p></div></div>
                <div class="row"><div class="col-6"><p>Total a pagar:</p></div><div class="col-6 text-end"><p><strong>${fmoney(totalPagar)}</strong></p></div></div>
                <div class="row"><div class="col-6"><p>Cuotas:</p></div><div class="col-6 text-end"><p>${plazo} × ${fmoney(cuotaValor)}</p></div></div>
                <div class="row"><div class="col-6"><p>Frecuencia:</p></div><div class="col-6 text-end"><p>${frecuencia.charAt(0).toUpperCase() + frecuencia.slice(1)}</p></div></div>
                <div class="row"><div class="col-6"><p>Inicio → Fin:</p></div><div class="col-6 text-end"><p style="font-size:var(--font-xs)">${new Date(fecha + 'T00:00:00').toLocaleDateString('es-CO')} → ${fechaFin.toLocaleDateString('es-CO')}</p></div></div>
            `;

            amortEl.style.display = 'block';
            document.getElementById('amort-body').innerHTML = cuotas.map(function(c) {
                return `<tr>
                    <td>${c.numero}</td>
                    <td>${c.fecha.toLocaleDateString('es-CO')}</td>
                    <td>${fmoney(c.capital)}</td>
                    <td>${fmoney(c.interes)}</td>

        savePrestamo: async function() {
            var clId = parseInt(document.getElementById('pcli').value);
            if (!clId) return this.toast('Error', 'Seleccione cliente', 'danger');
            var monto = parseFloat(document.getElementById('pmonto').value);
            if (!monto) return this.toast('Error', 'Ingrese monto', 'danger');
            var tasa = parseFloat(document.getElementById('ptasa').value);
            var tipo = document.getElementById('ptipo').value;
            var fecha = new Date(document.getElementById('pfecha').value + 'T00:00:00');
            var frecuencia = document.getElementById('pfrec').value;
            var plazo = parseInt(document.getElementById('pcuotas').value);
            var id = document.getElementById('pid').value;

            var pd = {
                cliente_id: clId,
                monto: monto,
                tasa: tasa,
                tipo: tipo,
                fecha: fecha.getTime(),
                frecuencia: frecuencia,
                plazo: plazo,
                estado: 'activo'
            };

            var pid;
            if (id) {
                await DB.prestamos.update(Number(id), pd);
                await DB.cuotas.where({ prestamo_id: Number(id) }).delete();
                pid = Number(id);
            } else {
                pid = await DB.prestamos.add(pd);
            }

            var cuotas = this.calcAmortizacion(monto, tasa, tipo, plazo, fecha, frecuencia);
            for (var i = 0; i < cuotas.length; i++) {
                await DB.cuotas.add({
                    prestamo_id: pid,
                    numero_cuota: cuotas[i].numero,
                    fecha_vencimiento: cuotas[i].fecha.getTime(),
                    capital: Math.round(cuotas[i].capital),
                    interes: Math.round(cuotas[i].interes),
                    monto_total: Math.round(cuotas[i].monto_total),
                    saldo_restante: Math.round(cuotas[i].saldo_restante),
                    estado: 'pendiente'
                });
            }

            bootstrap.Modal.getInstance(document.getElementById('modPrestamo')).hide();
            this.preList();
            this.toast('✅', 'Préstamo creado', 'success');
        },

        exportExcel: async function(id) {
            var cu = await DB.cuotas.where({ prestamo_id: Number(id) }).toArray();
            cu.sort(function(a, b) { return a.numero_cuota - b.numero_cuota; });
            var data = cu.map(function(c) {
                return {
                    '#': c.numero_cuota,
                    'Fecha': new Date(c.fecha_vencimiento).toLocaleDateString('es-CO'),
                    'Capital': c.capital || 0,
                    'Interés': c.interes || 0,

                    'Saldo': c.saldo_restante || 0,
                    'Estado': c.estado || 'pendiente'

            var wb = XLSX.utils.book_new();
            var ws = XLSX.utils.json_to_sheet(data);

        changePassword: async function() {
            var old = prompt('🔒 Contraseña actual:');
            if (!old) return;
            var s = await DB.cfg.get('pwd_hash');
            if (!s) return;
            if (!(await this.verifyPwd(old, s.valor))) {
                this.toast('❌', 'Contraseña actual incorrecta', 'danger');
                return;
            }
            var newPwd = prompt('🔑 Nueva contraseña:');
            if (!newPwd || newPwd.length < 4) {
                this.toast('❌', 'Mínimo 4 caracteres', 'danger');
                return;
            }
            var confirmPwd = prompt('🔑 Confirmar nueva contraseña:');
            if (newPwd !== confirmPwd) {
                this.toast('❌', 'Las contraseñas no coinciden', 'danger');
                return;
            }
            var h = await this.hashPwd(newPwd);
            await DB.cfg.put({ clave: 'pwd_hash', valor: h });
            this.toast('✅', 'Contraseña actualizada', 'success');
            // Forzar relogin
            localStorage.removeItem('loansw_lwiv13');
            location.reload();

            var wb = XLSX.utils.book_new();

            var clientesWS = XLSX.utils.json_to_sheet(d.clientes.map(function(c) {
                return { ID: c.id, Nombre: c.nombre, Teléfono: c.telefono, Cédula: c.cedula, Dirección: c.direccion,
                    Aval: c.aval, Categoría: c.categoria };
            }));
            XLSX.utils.book_append_sheet(wb, clientesWS, 'Clientes');

            var prestamosWS = XLSX.utils.json_to_sheet(d.prestamos.map(function(p) {
                return { ID: p.id, Cliente: p.cliente_id, Monto: p.monto, Tasa: p.tasa, Tipo: p.tipo, Fecha: new Date(
                        p.fecha).toLocaleDateString('es-CO'), Frecuencia: p.frecuencia, Plazo: p.plazo,
                    Estado: p.estado };
            }));
            XLSX.utils.book_append_sheet(wb, prestamosWS, 'Préstamos');

            var cuotasWS = XLSX.utils.json_to_sheet(d.cuotas.map(function(c) {
                return { ID: c.id, Préstamo: c.prestamo_id, '#': c.numero_cuota, Fecha: new Date(c
                        .fecha_vencimiento).toLocaleDateString('es-CO'), Capital: c.capital, Interés: c
                        .interes, Cuota: c.monto_total, Saldo: c.saldo_restante, Estado: c.estado };
            }));
            XLSX.utils.book_append_sheet(wb, cuotasWS, 'Cuotas');

            var pagosWS = XLSX.utils.json_to_sheet(d.pagos.map(function(p) {
                return { ID: p.id, Préstamo: p.prestamo_id, Cuota: p.cuota_id, Monto: p.monto, Fecha: new Date(p
                        .fecha).toLocaleDateString('es-CO'), Método: p.metodo || 'efectivo' };
            }));
            XLSX.utils.book_append_sheet(wb, pagosWS, 'Pagos');

            var capitalWS = XLSX.utils.json_to_sheet(d.capital.map(function(c) {
                return { ID: c.id, Monto: c.monto, Fecha: new Date(c.fecha).toLocaleDateString('es-CO') };
            }));
            XLSX.utils.book_append_sheet(wb, capitalWS, 'Capital');

            var gastosWS = XLSX.utils.json_to_sheet(d.gastos.map(function(g) {
                return { ID: g.id, Categoría: g.categoria, Monto: g.monto, Fecha: new Date(g.fecha)
                        .toLocaleDateString('es-CO') };
            }));
            XLSX.utils.book_append_sheet(wb, gastosWS, 'Gastos');

            XLSX.writeFile(wb, 'loans_w_completo_' + new Date().toISOString().slice(0, 10) + '.xlsx');
            this.toast('✅', 'Todos los datos exportados a Excel', 'success');
        },

        exportAllPDF: async function() {
            var d = await this.getData();
            var { jsPDF } = window.jspdf;
            var doc = new jsPDF('p', 'mm', 'a4');
            var pageWidth = doc.internal.pageSize.getWidth();
            var y = 20;

            doc.setFontSize(20);
            doc.setTextColor('#6C5CE7');
            doc.text('Loans W - Reporte Completo', pageWidth / 2, y, { align: 'center' });
            y += 10;

            doc.setFontSize(11);
            doc.setTextColor('#333');
            doc.text('Fecha: ' + new Date().toLocaleString('es-CO'), pageWidth / 2, y, { align: 'center' });
            y += 15;

            // Resumen
            var m = this.getMetrics(d);
            doc.setFontSize(14);
            doc.setTextColor('#6C5CE7');
            doc.text('📊 Resumen Financiero', 14, y);
            y += 8;
            doc.setFontSize(10);
            doc.setTextColor('#333');
            doc.text('Capital disponible: ' + fmoney(m.disp), 14, y);
            y += 6;
            doc.text('Cartera activa: ' + fmoney(m.cartera), 14, y);
            y += 6;
            doc.text('Ganancia neta: ' + fmoney(m.ganancia), 14, y);
            y += 6;
            doc.text('Clientes totales: ' + d.clientes.length, 14, y);
            y += 6;
            doc.text('Préstamos activos: ' + m.activos, 14, y);
            y += 10;

            // Clientess
            doc.setFontSize(14);
            doc.setTextColor('#6C5CE7');
            doc.text('👥 Clientes (' + d.clientes.length + ')', 14, y);
            y += 8;
            if (d.clientes.length > 0) {
                doc.autoTable({
                    startY: y,
                    head: [['#', 'Nombre', 'Cédula', 'Teléfono', 'Categoría']],
                    body: d.clientes.map(function(c, i) {
                        return [i + 1, c.nombre || '-', c.cedula || '-', c.telefono || '-', c.categoria || '-'];
                    }),
                    theme: 'striped',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: '#6C5CE7' }
                });
                y = doc.lastAutoTable.finalY + 10;
            } else {
                doc.text('Sin clientes registrados', 14, y);
                y += 10;
            }

            // Préstamos
            if (y > 250) { doc.addPage();
                y = 20; }
            doc.setFontSize(14);
            doc.setTextColor('#6C5CE7');
            doc.text('💵 Préstamos (' + d.prestamos.length + ')', 14, y);
            y += 8;
            if (d.prestamos.length > 0) {
                doc.autoTable({
                    startY: y,
                    head: [['#', 'Cliente ID', 'Monto', 'Tasa', 'Estado']],
                    body: d.prestamos.map(function(p, i) {
                        return [i + 1, p.cliente_id || '-', fmoney(p.monto || 0), p.tasa + '%', p.estado || '-'];
                    }),
                    theme: 'striped',
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: '#6C5CE7' }
                });
                y = doc.lastAutoTable.finalY + 10;
            } else {
                doc.text('Sin préstamos registrados', 14, y);
                y += 10;
            }

            doc.save('loans_w_reporte_' + new Date().toISOString().slice(0, 10) + '.pdf');
            this.toast('✅', 'PDF generado correctamente', 'success');
        }
    };

    // ============================================================
    // 6. INICIO
    // ============================================================
    document.addEventListener('DOMContentLoaded', function() {
        APP.init();
    });
    </script>
</body>
</html>
