<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6c5ce7">
    <title>Loans W - LWI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root{
            --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
            --bg:#f0f2ff;--card:#fff;--text:#1e1e2e;--sub:#5a5a7a;
            --border:#e2e4f0;--primary:#6c5ce7;--success:#00b894;--danger:#ff6b6b;
            --warning:#f59e0b;--info:#3b82f6;--shadow:0 2px 10px rgba(0,0,0,0.06);
            --radius:clamp(0.6rem,2vw,1rem);--font-xs:clamp(0.55rem,1.4vw,0.68rem);
            --font-sm:clamp(0.65rem,1.6vw,0.8rem);--font-md:clamp(0.75rem,1.9vw,0.9rem);
            --font-lg:clamp(0.9rem,2.3vw,1.2rem);--spacing-xs:clamp(0.2rem,0.6vw,0.4rem);
            --spacing-sm:clamp(0.4rem,1vw,0.6rem);--spacing-md:clamp(0.6rem,1.5vw,0.9rem);
            --ease-smooth:0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .dark-mode{--bg:#0a0c18;--card:#151829;--text:#e8eaf0;--sub:#9094b0;--border:#252840;--shadow:0 2px 10px rgba(0,0,0,0.3)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html{font-size:16px;-webkit-text-size-adjust:100%;height:-webkit-fill-available}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column;padding-top:var(--sat);padding-bottom:var(--sab)}

        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scaleIn{from{opacity:0;transform:scale(0.97)}to{opacity:1;transform:scale(1)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(108,92,231,0.3)}50%{box-shadow:0 0 20px rgba(108,92,231,0.6)}}
        @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes floatParticle{0%{transform:translateY(0) rotate(0deg);opacity:0}20%{opacity:0.2}80%{opacity:0.12}100%{transform:translateY(-100vh) rotate(360deg);opacity:0}}
        @keyframes ripple-effect{to{transform:scale(4);opacity:0}}

        .anim-fade{animation:fadeIn 0.35s ease forwards}
        .anim-up{animation:fadeUp 0.4s var(--ease-smooth) forwards}
        .anim-down{animation:fadeDown 0.35s var(--ease-smooth) forwards}
        .anim-scale{animation:scaleIn 0.3s var(--ease-smooth) forwards}
        .anim-float{animation:float 4s ease-in-out infinite}
        .anim-glow{animation:glow 3s ease-in-out infinite}
        .stagger>*{opacity:0;animation:fadeUp 0.3s var(--ease-smooth) forwards}
        .stagger>*:nth-child(1){animation-delay:0.02s}.stagger>*:nth-child(2){animation-delay:0.05s}
        .stagger>*:nth-child(3){animation-delay:0.08s}.stagger>*:nth-child(4){animation-delay:0.11s}

        #login-screen{position:fixed;top:0;left:0;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4a3fd4 0%,#6c5ce7 25%,#a29bfe 50%,#7c6ff7 75%,#5a4fd4 100%);background-size:400% 400%;animation:gradientShift 12s ease infinite;z-index:9999;padding:var(--spacing-sm);overflow:hidden}
        .particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
        .particle{position:absolute;font-size:1.4rem;opacity:0;animation:floatParticle 7s ease-in-out infinite}
        .login-card{background:rgba(255,255,255,0.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:1.5rem;padding:2rem 1.8rem;width:min(100%,22rem);text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.18);animation:scaleIn 0.5s var(--ease-smooth);position:relative;z-index:1;border:1px solid rgba(255,255,255,0.4)}
        .dark-mode .login-card{background:rgba(22,24,41,0.94);border-color:rgba(255,255,255,0.08)}
        .login-logo{width:4.2rem;height:4.2rem;background:linear-gradient(135deg,#6c5ce7,#a29bfe,#7c6ff7);background-size:200% 200%;animation:gradientShift 4s ease infinite,glow 3s ease-in-out infinite,float 4s ease-in-out infinite;border-radius:1.2rem;display:inline-flex;align-items:center;justify-content:center;font-size:2.1rem;color:#fff;margin-bottom:var(--spacing-sm);box-shadow:0 10px 30px rgba(108,92,231,0.4)}
        .login-input{border:2px solid #e8eaf0;border-radius:0.9rem;padding:0.85rem 1rem;font-size:var(--font-md);width:100%;margin-bottom:0.6rem;background:#f8f9ff;color:var(--text);outline:none;transition:all var(--ease-smooth)}
        .dark-mode .login-input{background:#1c1f30;border-color:#353850;color:#e8eaf0}
        .login-input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(108,92,231,0.1);transform:translateY(-1px)}
        .login-btn{background:linear-gradient(135deg,#6c5ce7,#7c6ff7,#a29bfe);background-size:200% 200%;animation:gradientShift 4s ease infinite;color:#fff;border:none;border-radius:0.9rem;padding:0.85rem;font-size:var(--font-md);font-weight:700;width:100%;cursor:pointer;transition:all var(--ease-smooth);letter-spacing:0.4px;box-shadow:0 6px 18px rgba(108,92,231,0.3);position:relative;overflow:hidden}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(108,92,231,0.45)}
        .login-btn:active{transform:scale(0.97)}
        .ripple-container{position:relative;overflow:hidden}
        .ripple-effect-el{position:absolute;border-radius:50%;background:rgba(255,255,255,0.4);transform:scale(0);animation:ripple-effect 0.6s ease-out;pointer-events:none}

        #main-app{display:none;flex:1;flex-direction:column;min-height:100vh}
        #main-app.show{display:flex;animation:fadeIn 0.3s ease}
        .app-wrap{flex:1;width:min(100%,75rem);margin:0 auto;padding:var(--spacing-md);padding-bottom:calc(4.5rem + var(--sab) + var(--spacing-md))}

        .header{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm) var(--spacing-md);margin-bottom:var(--spacing-md);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);position:sticky;top:calc(var(--sat) + var(--spacing-xs));z-index:40;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);flex-wrap:wrap;gap:var(--spacing-xs);animation:fadeDown 0.35s var(--ease-smooth);transition:all 0.3s ease}
        .header:hover{box-shadow:0 4px 14px rgba(0,0,0,0.08);border-color:rgba(108,92,231,0.15)}
        .brand{font-size:var(--font-lg);font-weight:800;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-actions{display:flex;gap:var(--spacing-xs)}
        .btn-icon{width:2.2rem;height:2.2rem;border-radius:50%;border:none;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all var(--ease-smooth);position:relative;overflow:hidden}
        .btn-icon:hover{background:rgba(108,92,231,0.1);color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 10px rgba(108,92,231,0.15)}

        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--spacing-sm);margin-bottom:var(--spacing-md)}
        @media(min-width:35rem){.stats-grid{grid-template-columns:repeat(4,1fr)}}
        .stat-card{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm);box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;min-width:0;transition:all var(--ease-smooth);position:relative;overflow:hidden}
        .stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.12);border-color:rgba(108,92,231,0.2)}
        .stat-icon{width:2.2rem;height:2.2rem;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:var(--spacing-xs);transition:all var(--ease-smooth)}
        .stat-card:hover .stat-icon{transform:scale(1.06) rotate(-2deg)}
        .stat-label{font-size:var(--font-xs);color:var(--sub);text-transform:uppercase;font-weight:600}
        .stat-value{font-size:var(--font-lg);font-weight:800;margin-top:0.1rem}

        .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:var(--spacing-md);overflow:hidden;width:100%;transition:all var(--ease-smooth)}
        .card:hover{box-shadow:0 6px 18px rgba(0,0,0,0.1);border-color:rgba(108,92,231,0.1)}
        .card-header{padding:var(--spacing-sm) var(--spacing-md);border-bottom:1px solid var(--border);font-weight:700;font-size:var(--font-sm);display:flex;justify-content:space-between;align-items:center}
        .card-body{padding:var(--spacing-sm) var(--spacing-md)}

        .badge{padding:0.2rem 0.7rem;border-radius:1rem;font-size:var(--font-xs);font-weight:700;white-space:nowrap;letter-spacing:0.3px;transition:all var(--ease-smooth)}
        .badge-a{background:linear-gradient(135deg,#e9e5ff,#f0edff);color:#4a3cc7;box-shadow:0 2px 6px rgba(108,92,231,0.12)}
        .badge-l{background:linear-gradient(135deg,#ffe4e4,#fff0f0);color:#d63031;animation:pulse 2s ease-in-out infinite;box-shadow:0 2px 6px rgba(255,107,107,0.15)}
        .badge-p{background:linear-gradient(135deg,#d6f7ee,#e8faf5);color:#007a55;box-shadow:0 2px 6px rgba(0,184,148,0.12)}
        .badge-w{background:linear-gradient(135deg,#fff8e6,#fffdf5);color:#b07d00;box-shadow:0 2px 6px rgba(245,158,11,0.12)}
        .dark-mode .badge-a{background:linear-gradient(135deg,#2d2750,#353050);color:#b8b0ff}
        .dark-mode .badge-l{background:linear-gradient(135deg,#3d1c1c,#452525);color:#ff8a8a}
        .dark-mode .badge-p{background:linear-gradient(135deg,#1a332a,#223d35);color:#4fe0b0}

        .btn{padding:0.4rem 1rem;border-radius:3rem;font-weight:700;font-size:var(--font-xs);cursor:pointer;border:none;display:inline-flex;align-items:center;gap:0.2rem;white-space:nowrap;transition:all var(--ease-smooth);position:relative;overflow:hidden}
        .btn:hover{transform:translateY(-1px)}
        .btn:active{transform:scale(0.95)}
        .btn-p{background:linear-gradient(135deg,#6c5ce7,#7c6ff7);color:#fff;box-shadow:0 4px 12px rgba(108,92,231,0.25)}
        .btn-p:hover{box-shadow:0 8px 20px rgba(108,92,231,0.4)}
        .btn-s{background:linear-gradient(135deg,#00b894,#3dd9a4);color:#fff;box-shadow:0 4px 12px rgba(0,184,148,0.25)}
        .btn-d{background:linear-gradient(135deg,#ff6b6b,#ff8e8e);color:#fff;box-shadow:0 4px 12px rgba(255,107,107,0.25)}
        .btn-o{border:2px solid var(--primary);color:var(--primary);background:transparent}
        .btn-o:hover{background:var(--primary);color:#fff;box-shadow:0 6px 16px rgba(108,92,231,0.3)}
        .btn-xs{padding:0.15rem 0.45rem;font-size:0.55rem}
        .btn-wa{background:#25D366;color:#fff;box-shadow:0 4px 12px rgba(37,211,102,0.3)}

        .nav{position:fixed;bottom:calc(var(--sab) + var(--spacing-xs));left:50%;transform:translateX(-50%);background:var(--card);display:flex;justify-content:space-around;padding:var(--spacing-xs) 0;box-shadow:0 -4px 20px rgba(0,0,0,0.1);z-index:100;border-radius:2.5rem;border:1px solid var(--border);width:min(98%,34rem);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:fadeUp 0.4s var(--ease-smooth)}
        @media(min-width:48rem){.nav{display:none}}
        .nav-btn{display:flex;flex-direction:column;align-items:center;font-size:0.48rem;color:var(--sub);border:none;background:none;cursor:pointer;padding:0.2rem 0.4rem;border-radius:1.5rem;font-weight:600;transition:all var(--ease-smooth)}
        .nav-btn.active{color:var(--primary);font-weight:700;transform:translateY(-2px)}
        .nav-btn i{font-size:1.05rem;margin-bottom:1px;transition:all var(--ease-smooth)}
        .nav-btn.active i{transform:scale(1.1)}

        canvas{width:100%!important;max-height:14rem}
        .list-item{display:flex;align-items:center;padding:var(--spacing-sm);border-bottom:1px solid var(--border);gap:var(--spacing-sm);cursor:pointer;transition:all var(--ease-smooth)}
        .list-item:hover{background:rgba(108,92,231,0.03);transform:translateX(2px)}
        .list-item:active{transform:scale(0.98)}
        .list-item:last-child{border-bottom:none}
        .avatar-sm{width:2.1rem;height:2.1rem;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light,#a29bfe));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.72rem;flex-shrink:0;transition:all var(--ease-smooth);box-shadow:0 3px 8px rgba(108,92,231,0.2)}
        .list-item:hover .avatar-sm{transform:scale(1.06) rotate(3deg);box-shadow:0 5px 14px rgba(108,92,231,0.35)}

        .toast-box{position:fixed;top:calc(var(--sat) + var(--spacing-sm));right:var(--spacing-sm);z-index:9999;max-width:90vw}
        .toast{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm);box-shadow:0 8px 20px rgba(0,0,0,0.15);margin-bottom:var(--spacing-xs);font-weight:600;font-size:var(--font-xs);border-left:4px solid var(--primary);animation:fadeUp 0.3s var(--ease-smooth)}
        .text-success{color:var(--success)!important}.text-danger{color:var(--danger)!important}.text-warning{color:var(--warning)!important}
        .d-flex{display:flex}.justify-between{justify-content:space-between}.text-center{text-align:center}.fw-bold{font-weight:700}
        .mb-1{margin-bottom:0.25rem}.mb-2{margin-bottom:0.5rem}.mt-2{margin-top:0.5rem}.w-100{width:100%}.p-2{padding:0.5rem}.p-4{padding:1rem}.text-muted{color:var(--sub)}
        .row{display:flex;flex-wrap:wrap}.col-6{flex:0 0 50%;max-width:50%}.g-2{gap:0.5rem}
        .table-responsive{width:100%;overflow-x:auto}.table{font-size:var(--font-xs);min-width:28rem;width:100%;margin:0}
        .table th{font-weight:600;padding:var(--spacing-xs) var(--spacing-sm)}.table td{padding:var(--spacing-xs) var(--spacing-sm)}
        .f-control{border:2px solid var(--border);border-radius:0.4rem;padding:0.5rem;font-size:var(--font-sm);background:var(--card);color:var(--text);width:100%;margin-bottom:var(--spacing-xs);transition:all var(--ease-smooth)}
        .f-control:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(108,92,231,0.06)}
        .modal-content{border-radius:1.2rem;border:none;margin:var(--spacing-sm);max-height:85vh;overflow-y:auto;animation:scaleIn 0.3s var(--ease-smooth)}
        .kpi-big{font-size:clamp(1.5rem,5vw,2.5rem);font-weight:800}
        .summary-box{background:var(--bg);border-radius:var(--radius);padding:var(--spacing-sm);margin-top:var(--spacing-sm)}
        .gauge-wrap{position:relative;width:min(70vw,14rem);height:min(35vw,7rem);margin:0 auto;overflow:hidden}
        .score-hero{font-size:clamp(3rem,10vw,5rem);font-weight:900;line-height:1;letter-spacing:-2px}
        .alert-item{padding:var(--spacing-sm);border-radius:var(--radius);margin-bottom:var(--spacing-xs);font-size:var(--font-xs);display:flex;align-items:flex-start;gap:var(--spacing-sm)}
        .alert-info{background:#dbeafe;color:#1e40af;border-left:4px solid #3b82f6}.dark-mode .alert-info{background:#1a2740;color:#93c5fd}
        .alert-danger{background:#ffe4e4;color:#991b1b;border-left:4px solid #ff6b6b}.alert-warning{background:#fff8e6;color:#92400e;border-left:4px solid #f59e0b}
        .ranking-list{max-height:18rem;overflow-y:auto}
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="particles" id="particles"></div>
        <div class="login-card">
            <div class="login-logo">🧠</div>
            <h3 style="font-weight:800;margin-bottom:0.2rem">Loans W</h3>
            <p style="color:var(--sub);margin-bottom:var(--spacing-sm);font-size:var(--font-xs)">LWI Intelligence</p>
            <input type="password" id="pwd" class="login-input" placeholder="🔒 Contraseña" autocomplete="off">
            <button class="login-btn ripple-container" id="loginBtn">Ingresar</button>
            <div id="login-err" style="color:#ff6b6b;font-weight:600;margin-top:0.5rem;font-size:0.7rem"></div>
            <p style="color:var(--sub);font-size:0.6rem;margin-top:0.5rem">admin</p>
        </div>
    </div>
    <div id="main-app">
        <div class="app-wrap" id="page"><div class="text-center" style="padding:2.5rem;color:var(--sub)">Cargando...</div></div>
        <nav class="nav">
            <button class="nav-btn active" data-p="dashboard"><i class="bi bi-speedometer2"></i>Inicio</button>
            <button class="nav-btn" data-p="lwi"><i class="bi bi-cpu-fill"></i>LWI</button>
            <button class="nav-btn" data-p="clientes"><i class="bi bi-people-fill"></i>Clientes</button>
            <button class="nav-btn" data-p="prestamos"><i class="bi bi-cash-stack"></i>Préstamos</button>
            <button class="nav-btn" data-p="finanzas"><i class="bi bi-bank"></i>Capital</button>
        </nav>
    </div>
    <div class="toast-box" id="toasts"></div>

    <!-- MODALES -->
    <div class="modal fade" id="modCliente"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>👤 Cliente</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="cid"><input class="f-control" id="cnom" placeholder="Nombre completo *"><div class="row g-2"><div class="col-6"><input class="f-control" id="ctel" placeholder="Teléfono"></div><div class="col-6"><input class="f-control" id="cced" placeholder="Cédula"></div></div><input class="f-control" id="cdir" placeholder="Dirección"><input class="f-control" id="cava" placeholder="Aval"><select class="f-control" id="ccat"><option value="regular">⭐ Regular</option><option value="vip">👑 VIP</option><option value="riesgoso">⚠️ Riesgoso</option></select></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-p" onclick="APP.saveCliente()">💾 Guardar</button></div></div></div></div>
    <div class="modal fade" id="modPrestamo"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>💰 Nuevo Préstamo</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="pid"><select class="f-control" id="pcli"><option value="">Seleccionar cliente...</option></select><div class="row g-2 mb-1"><div class="col-6"><label style="font-size:var(--font-xs);font-weight:600">Monto ($) *</label><input type="number" class="f-control" id="pmonto" placeholder="Ej: 1000000" min="1000" step="1000"></div><div class="col-6"><label style="font-size:var(--font-xs);font-weight:600">Tasa (%) *</label><input type="number" class="f-control" id="ptasa" placeholder="Ej: 10" min="0.01" step="0.01"></div></div><div class="mb-1"><label style="font-size:var(--font-xs);font-weight:600">Tipo de interés</label><select class="f-control" id="ptipo"><option value="simple">Interés Simple</option><option value="saldo">Interés sobre Saldo</option></select></div><div class="row g-2 mb-1"><div class="col-6"><label style="font-size:var(--font-xs);font-weight:600">Fecha inicio *</label><input type="date" class="f-control" id="pfecha"></div><div class="col-6"><label style="font-size:var(--font-xs);font-weight:600">Frecuencia *</label><select class="f-control" id="pfrec"><option value="semanal">Semanal</option><option value="quincenal">Quincenal</option><option value="mensual">Mensual</option><option value="diaria">Diaria</option></select></div></div><div class="mb-1"><label style="font-size:var(--font-xs);font-weight:600">Número de cuotas *</label><input type="number" class="f-control" id="pcuotas" placeholder="Ej: 12" min="1" max="120"></div><div id="loan-summary" class="summary-box" style="display:none"><h6 style="font-weight:700;margin-bottom:0.5rem">📋 Resumen</h6><div id="summary-content"></div></div><div id="amort-vista" style="display:none;background:var(--bg);border-radius:var(--radius);padding:var(--spacing-sm);margin-top:var(--spacing-sm)"><h6 style="font-weight:700;margin-bottom:0.3rem">📅 Cronograma</h6><div class="table-responsive" style="max-height:12rem"><table class="table table-sm"><thead><tr><th>#</th><th>Fecha</th><th>Capital</th><th>Interés</th><th>Cuota</th><th>Saldo</th></tr></thead><tbody id="amort-body"></tbody></table></div></div><div id="loan-error" class="text-danger" style="font-size:var(--font-xs);margin-top:var(--spacing-xs);display:none"></div></div><div class="modal-footer"><button class="btn btn-light" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-p" id="btnCreateLoan" onclick="APP.savePrestamo()" disabled>✅ Crear Préstamo</button></div></div></div></div>
    <div class="modal fade" id="modCalc"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5>🧮 Calculadora</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="number" class="f-control" id="calcM" placeholder="Monto"><input type="number" class="f-control" id="calcT" placeholder="Tasa %"><input type="number" class="f-control" id="calcP" placeholder="Cuotas"><div id="calcRes" class="summary-box"></div><button class="btn btn-p w-100 mt-2" onclick="APP.calcPrestamo()">🔢 Calcular</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    "use strict";
    (function(){var icons=['💰','💵','💎','📊','🧠','⭐'];var c=document.getElementById('particles');if(c){for(var i=0;i<18;i++){var p=document.createElement('span');p.className='particle';p.textContent=icons[Math.floor(Math.random()*icons.length)];p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.animationDelay=Math.random()*7+'s';p.style.animationDuration=(5+Math.random()*7)+'s';c.appendChild(p);}}})();
    document.addEventListener('click',function(e){var btn=e.target.closest('.btn,.btn-icon,.login-btn');if(btn){var ripple=document.createElement('span');ripple.className='ripple-effect-el';var rect=btn.getBoundingClientRect();var size=Math.max(rect.width,rect.height);ripple.style.width=ripple.style.height=size+'px';ripple.style.left=(e.clientX-rect.left-size/2)+'px';ripple.style.top=(e.clientY-rect.top-size/2)+'px';btn.appendChild(ripple);setTimeout(function(){ripple.remove();},600);}});

    var COP=new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0,minimumFractionDigits:0});
    var fmoney=function(v){return COP.format(Math.round(v||0));};
    var sanitize=function(s){if(!s||typeof s!=='string')return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;};

    var DB=new Dexie('LoansWLWIv12');
    DB.version(4).stores({cfg:'clave',clientes:'++id',prestamos:'++id,cliente_id,estado',cuotas:'++id,prestamo_id,estado,fecha_vencimiento',pagos:'++id,prestamo_id,cuota_id,fecha',capital:'++id,fecha',gastos:'++id,fecha'});

    var APP={
        charts:[],dark:false,_currentPage:'dashboard',
        init:async function(){
            await DB.open();
            var ph=await DB.cfg.get('pwd_hash');
            if(!ph){var h=await this.hashPwd('admin');await DB.cfg.put({clave:'pwd_hash',valor:h});await DB.cfg.put({clave:'mora',valor:'5'});await DB.cfg.put({clave:'dark',valor:'false'});await DB.cfg.put({clave:'capital_inicial',valor:'0'});}
            var d=await DB.cfg.get('dark');if(d&&d.valor==='true'){this.dark=true;document.body.classList.add('dark-mode');}
            document.getElementById('loginBtn').onclick=function(){APP.login();};
            document.getElementById('pwd').onkeydown=function(e){if(e.key==='Enter')APP.login();};
            document.querySelectorAll('.nav-btn').forEach(function(b){b.onclick=function(){APP.goto(b.dataset.p);};});
            if(localStorage.getItem('loansw_lwiv12')==='yes'){document.getElementById('login-screen').style.display='none';document.getElementById('main-app').style.display='flex';document.getElementById('main-app').classList.add('show');this.goto('dashboard');}
            setInterval(function(){APP.autoBackup();},1800000);
        },
        autoBackup:async function(){var d=await this.getData();var backup={clientes:d.clientes,prestamos:d.prestamos,cuotas:d.cuotas,pagos:d.pagos,capital:d.capital,gastos:d.gastos,timestamp:Date.now()};localStorage.setItem('loansw_autobackup',JSON.stringify(backup));},
        hashPwd:async function(p){var e=new TextEncoder(),s=crypto.getRandomValues(new Uint8Array(16)),k=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveBits']),h=await crypto.subtle.deriveBits({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},k,256);return JSON.stringify({salt:Array.from(s),hash:Array.from(new Uint8Array(h))});},
        verifyPwd:async function(p,st){try{var d=JSON.parse(st),s=d.salt,h=d.hash,e=new TextEncoder(),k=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveBits']),de=await crypto.subtle.deriveBits({name:'PBKDF2',salt:new Uint8Array(s),iterations:100000,hash:'SHA-256'},k,256),da=new Uint8Array(de),ha=new Uint8Array(h);if(da.length!==ha.length)return false;for(var i=0;i<da.length;i++){if(da[i]!==ha[i])return false;}return true;}catch(e){return false;}},
        login:async function(){var p=document.getElementById('pwd').value;if(!p){document.getElementById('login-err').textContent='Ingrese contraseña';return;}var s=await DB.cfg.get('pwd_hash');if(!s)return;if(await this.verifyPwd(p,s.valor)){localStorage.setItem('loansw_lwiv12','yes');document.getElementById('login-screen').style.display='none';document.getElementById('main-app').style.display='flex';document.getElementById('main-app').classList.add('show');this.goto('dashboard');}else{document.getElementById('login-err').textContent='Contraseña incorrecta';}},
        goto:function(p){this._currentPage=p;document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});var a=document.querySelector('.nav-btn[data-p="'+p+'"]');if(a)a.classList.add('active');this.render(p);window.scrollTo({top:0,behavior:'smooth'});},
        destroyCharts:function(){this.charts.forEach(function(c){try{c.destroy();}catch(e){}});this.charts=[];},
        toast:function(t,m){var box=document.getElementById('toasts');if(!box)return;var el=document.createElement('div');el.className='toast';el.innerHTML='<strong>'+sanitize(t)+'</strong><br><small>'+sanitize(m)+'</small>';box.appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='0.3s';setTimeout(function(){el.remove();},300);},2500);},
        getData:async function(){return{clientes:await DB.clientes.toArray(),prestamos:await DB.prestamos.toArray(),cuotas:await DB.cuotas.toArray(),pagos:await DB.pagos.toArray(),capital:await DB.capital.toArray(),gastos:await DB.gastos.toArray(),capInicial:parseFloat((await DB.cfg.get('capital_inicial'))?.valor||'0'),now:new Date()};},
        getMetrics:function(d){
            var capTotal=d.capital.reduce(function(s,c){return s+(c.monto||0);},0)+d.capInicial;
            var gastosTotal=d.gastos.reduce(function(s,g){return s+(g.monto||0);},0);
            var cartera=d.prestamos.filter(function(p){return p.estado==='activo';}).reduce(function(s,p){return s+(p.monto||0);},0);
            var cobradoHist=d.pagos.reduce(function(s,p){return s+(p.monto||0);},0);
            var interesHist=0;for(var i=0;i<d.pagos.length;i++){for(var j=0;j<d.cuotas.length;j++){if(d.cuotas[j].id===d.pagos[i].cuota_id){interesHist+=d.cuotas[j].interes||0;break;}}}
            var disp=capTotal+cobradoHist+interesHist-cartera-gastosTotal;
            var ganancia=cobradoHist+interesHist-gastosTotal;
            var moraMonto=0,moraSet=new Set();for(var k=0;k<d.cuotas.length;k++){if(d.cuotas[k].estado==='atrasada'){moraMonto+=d.cuotas[k].monto_total||0;var p2=d.prestamos.find(function(x){return x.id===d.cuotas[k].prestamo_id;});if(p2)moraSet.add(p2.cliente_id);}}
            var prestadoHist=d.prestamos.reduce(function(s,p){return s+(p.monto||0);},0);
            var activos=d.prestamos.filter(function(p){return p.estado==='activo';}).length;
            var hoy=new Date(d.now.getFullYear(),d.now.getMonth(),d.now.getDate()),semana=new Date(hoy.getTime()+7*86400000),finMes=new Date(d.now.getFullYear(),d.now.getMonth()+1,0);
            var proyHoy=0,proySemana=0,proyMes=0;
            for(var l=0;l<d.cuotas.length;l++){var c2=d.cuotas[l];if(c2.estado==='pagada')continue;if(c2.fecha_vencimiento>=hoy.getTime()&&c2.fecha_vencimiento<hoy.getTime()+86400000)proyHoy+=c2.monto_total||0;if(c2.fecha_vencimiento>=d.now.getTime()&&c2.fecha_vencimiento<=semana.getTime()&&c2.estado==='pendiente')proySemana+=c2.monto_total||0;if(c2.fecha_vencimiento>=d.now.getTime()&&c2.fecha_vencimiento<=finMes.getTime()&&c2.estado==='pendiente')proyMes+=c2.monto_total||0;}
            return{capTotal:capTotal,gastos:gastosTotal,cartera:cartera,cobradoHist:cobradoHist,interesHist:interesHist,disp:disp,ganancia:ganancia,moraMonto:moraMonto,moraClientes:moraSet.size,activos:activos,clientesTotal:d.clientes.length,prestadoHist:prestadoHist,proyHoy:proyHoy,proySemana:proySemana,proyMes:proyMes};
        },
        calcSalud:function(m){var score=0;if(m.capTotal>0)score+=Math.min((m.disp/(m.capTotal+1))*25,20);if(m.cartera>0)score+=Math.max(0,20-((m.moraMonto/(m.cartera+1))*20));if(m.capTotal>0)score+=Math.min((m.ganancia/(m.capTotal+1))*150,18);if(m.capTotal+m.cartera>0)score+=Math.min((m.cobradoHist/(m.capTotal+m.cartera+1))*50,14);if(m.clientesTotal>0)score+=Math.min((m.activos/(m.clientesTotal+1))*10,10);return Math.max(5,Math.min(98,Math.round(score)));},
        render:async function(p){this.destroyCharts();var c=document.getElementById('page');if(!c)return;c.innerHTML='';if(p==='dashboard'){c.innerHTML=await this.dashHTML();setTimeout(function(){APP.dashInit();},300);}else if(p==='lwi'){c.innerHTML='<div class="text-center p-4"><div style="width:2rem;height:2rem;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem"></div><p style="color:var(--sub)">Analizando...</p></div>';var self=this;await new Promise(function(r){setTimeout(r,150);});var html=await self.lwiHTML();c.innerHTML=html;setTimeout(function(){self.lwiInit();},300);}else if(p==='clientes'){c.innerHTML=this.cliHTML();this.cliList();}else if(p==='prestamos'){c.innerHTML=await this.preHTML();this.preList();}else if(p==='finanzas'){c.innerHTML=await this.finHTML();setTimeout(function(){APP.finInit();},400);}},
        dashHTML:async function(){var d=await this.getData(),m=this.getMetrics(d);return'<div class="header"><span class="brand">Loans W 🧠</span><div class="header-actions"><button class="btn-icon" onclick="APP.goto(\'lwi\')">🧠</button><button class="btn-icon" onclick="APP.showCalc()">🧮</button><button class="btn-icon" onclick="APP.logout()">↩️</button></div></div><div class="stats-grid"><div class="stat-card" onclick="APP.goto(\'lwi\')"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">🧠</div><div class="stat-label">LWI</div><div class="stat-value">'+this.calcSalud(m)+'/100</div></div><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">🏦</div><div class="stat-label">Capital</div><div class="stat-value">'+fmoney(m.disp)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">💵</div><div class="stat-label">Cartera</div><div class="stat-value">'+fmoney(m.cartera)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#fff8e6;color:#f59e0b">📈</div><div class="stat-label">Ganancia</div><div class="stat-value text-warning">'+fmoney(m.ganancia)+'</div></div></div><div class="row g-2 mb-3"><div class="col-6"><div class="card"><div class="card-header">📅 Hoy</div><div class="card-body text-center"><div class="kpi-big text-info">'+fmoney(m.proyHoy)+'</div></div></div></div><div class="col-6"><div class="card"><div class="card-header">📆 Este Mes</div><div class="card-body text-center"><div class="kpi-big text-success">'+fmoney(m.proyMes)+'</div></div></div></div></div><div class="card"><div class="card-header">🧮 Calculadora Rápida</div><div class="card-body"><div class="row g-2"><div class="col-6"><input type="number" class="f-control" id="quickM" placeholder="Monto" oninput="APP.quickCalc()"></div><div class="col-6"><input type="number" class="f-control" id="quickT" placeholder="Tasa %" oninput="APP.quickCalc()"></div><div class="col-6"><input type="number" class="f-control" id="quickP" placeholder="Cuotas" oninput="APP.quickCalc()"></div><div class="col-6"><select class="f-control" id="quickF" onchange="APP.quickCalc()"><option value="mensual">Mensual</option><option value="quincenal">Quincenal</option><option value="semanal">Semanal</option></select></div></div><div id="quickRes" class="summary-box"></div></div></div><div class="card"><div class="card-header">📊 Ganancias</div><div class="card-body"><canvas id="chart1"></canvas></div></div>';},
        dashInit:async function(){var c1=document.getElementById('chart1');if(c1){var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],data=new Array(12).fill(0),pagos=await DB.pagos.toArray();for(var i=0;i<pagos.length;i++){var m=new Date(pagos[i].fecha).getMonth();data[m]+=pagos[i].monto||0;}this.charts.push(new Chart(c1,{type:'bar',data:{labels:meses,datasets:[{data:data.map(function(v){return Math.round(v);}),backgroundColor:'rgba(108,92,231,0.8)',borderRadius:8}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return fmoney(v);}}}}}}));}},
        quickCalc:function(){var m=parseFloat(document.getElementById('quickM').value)||0,t=parseFloat(document.getElementById('quickT').value)||0,p=parseInt(document.getElementById('quickP').value)||0;if(!m||!t||!p){document.getElementById('quickRes').innerHTML='';return;}var cf=(m+m*(t/100))/p;document.getElementById('quickRes').innerHTML='<p><strong>💰 Cuota:</strong> '+fmoney(cf)+'</p><p><strong>💵 Total:</strong> '+fmoney(cf*p)+'</p><p><strong>📈 Interés:</strong> '+fmoney((cf*p)-m)+'</p>';},
        showCalc:function(){new bootstrap.Modal(document.getElementById('modCalc')).show();},

        lwiHTML:async function(){var d=await this.getData(),m=this.getMetrics(d),score=this.calcSalud(m),color=score>=75?'#00b894':score>=50?'#f59e0b':'#ff6b6b',salud=score>=90?'Excelente':score>=75?'Saludable':score>=50?'Regular':'Riesgo';var recs=[];if(m.disp>m.cartera&&m.cartera>0){var prom=m.cartera/(m.activos||1),cant=Math.floor(m.disp/(prom||1));if(cant>0)recs.push('✅ Puedes otorgar ~'+cant+' préstamos más de '+fmoney(prom)+' c/u.');}if(m.cartera>0){var moraP=Math.round((m.moraMonto/(m.cartera+1))*100);if(moraP>25)recs.push('🚨 Más del '+moraP+'% de tu cartera está en mora.');}if(m.disp>m.cartera*2)recs.push('💰 Capital inmovilizado: '+fmoney(m.disp));if(m.disp<m.cartera*0.3&&m.cartera>0)recs.push('⚠️ Liquidez baja: '+fmoney(m.disp));if(m.ganancia>0)recs.push('📊 Rentabilidad: '+Math.round((m.ganancia/(m.capTotal+1))*100)+'%');var clientes=[];for(var i=0;i<d.clientes.length;i++){var cl=d.clientes[i],ps=d.prestamos.filter(function(p){return p.cliente_id===cl.id;});if(ps.length===0)continue;var total=ps.reduce(function(s,p){return s+(p.monto||0);},0),cuotas=[];for(var j=0;j<ps.length;j++){cuotas=cuotas.concat(d.cuotas.filter(function(c){return c.prestamo_id===ps[j].id;}));}var pagadas=cuotas.filter(function(c){return c.estado==='pagada';}).length,punt=cuotas.length>0?Math.round((pagadas/cuotas.length)*100):0,sc=punt*0.5+Math.min(total/100000,100)*0.2+ps.length*5;clientes.push({nombre:cl.nombre,total:total,prestamos:ps.length,puntualidad:punt,score:Math.round(sc),nivel:sc>=85?'⭐ Platino':sc>=65?'🥇 Oro':sc>=45?'🥈 Plata':sc>=25?'🥉 Bronce':'🚨 Riesgoso'});}clientes.sort(function(a,b){return b.score-a.score;});var cobranza=[];for(var k=0;k<d.cuotas.length;k++){var cu=d.cuotas[k];if(cu.estado!=='atrasada')continue;var p=d.prestamos.find(function(x){return x.id===cu.prestamo_id;});if(!p)continue;var cl2=d.clientes.find(function(x){return x.id===p.cliente_id;});if(!cl2)continue;var dias=Math.round((d.now.getTime()-cu.fecha_vencimiento)/86400000);cobranza.push({cliente:cl2.n             printRows+='<tr><td>'+cu[i].numero_cuota+'</td><td>'+new Date(cu[i].fecha_vencimiento).toLocaleDateString('es-CO')+'</td><td>'+fmoney(cu[i].capital||0)+'</td><td>'+fmoney(cu[i].interes||0)+'</td><td><strong>'+fmoney(cu[i].monto_total||0)+'</strong></td><td>'+fmoney(cu[i].saldo_restante||0)+'</td><td><span class="badge '+(cu[i].estado==='pagada'?'badge-p':cu[i].estado==='atrasada'?'badge-l':'badge-a')+'">'+cu[i].estado+'</span></td></tr>';
        }
        document.getElementById('page').innerHTML='<div class="header"><span class="brand">Préstamo #'+id+'</span><button class="btn-icon" onclick="APP.goto(\'prestamos\')">←</button></div><div class="card anim-scale"><div class="card-body"><p><strong>Cliente:</strong> '+sanitize(cl?.nombre)+'</p><p><strong>Monto:</strong> '+fmoney(p.monto||0)+' | <strong>Tasa:</strong> '+p.tasa+'% | <strong>Tipo:</strong> '+p.tipo+'</p><div class="prog mb-2"><div class="prog-b" style="width:'+pc+'%;background:'+color+'"></div></div><p>'+pa+'/'+cu.length+' cuotas ('+pc+'%)</p><button class="btn btn-o btn-xs" onclick="APP.printCronograma(\''+id+'\')">🖨️ Imprimir</button></div></div><div class="card anim-scale" id="printArea'+id+'"><div class="card-header">📋 Cronograma</div><div class="table-responsive"><table class="table table-sm"><thead><tr><th>#</th><th>Fecha</th><th>Capital</th><th>Interés</th><th>Cuota</th><th>Saldo</th><th>Estado</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
        // Guardar datos para imprimir
        this._printData=printRows;
        },
        // IMPRIMIR CORREGIDO
        printCronograma:function(id){
            var el=document.getElementById('printArea'+id);
            if(!el)return;
            var w=window.open('','','width=900,height=700');
            w.document.write('<!DOCTYPE html><html><head><title>Loans W - Préstamo #'+id+'</title><style>body{font-family:Arial;padding:20px;color:#1e1e2e}h2{color:#6c5ce7;text-align:center}table{width:100%;border-collapse:collapse;margin-top:15px}th{background:#6c5ce7;color:#fff;padding:10px 8px;font-size:13px;text-align:left}td{border:1px solid #ddd;padding:8px;font-size:12px}tr:nth-child(even){background:#f9f9f9}.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}.badge-p{background:#d6f7ee;color:#007a55}.badge-l{background:#ffe4e4;color:#d63031}.badge-a{background:#e9e5ff;color:#4a3cc7}@media print{body{padding:0;margin:0}}</style></head><body><h2>📋 Cronograma de Pagos - Préstamo #'+id+'</h2><table><thead><tr><th>#</th><th>Fecha</th><th>Capital</th><th>Interés</th><th>Cuota</th><th>Saldo</th><th>Estado</th></tr></thead><tbody>'+this._printData+'</tbody></table></body></html>');
            w.document.close();
            setTimeout(function(){w.print();},500);
        },
        pagarCuota:function(pid,cid){DB.cuotas.get(cid).then(function(cu){DB.cuotas.update(cid,{estado:'pagada',saldo_restante:0});DB.pagos.add({prestamo_id:pid,cuota_id:cid,monto:cu.monto_total,fecha:Date.now(),metodo:'efectivo'});APP.verPrestamo(pid);APP.toast('✅','Pago registrado');});},
        finHTML:async function(){var d=await this.getData(),m=this.getMetrics(d);return'<div class="header"><span class="brand">🏦 Capital</span><div class="header-actions"><button class="btn btn-p btn-xs" onclick="APP.showCapital()">+ Capital</button><button class="btn btn-d btn-xs" onclick="APP.showGasto()">+ Gasto</button></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">🏦</div><div class="stat-label">Capital Disp.</div><div class="stat-value">'+fmoney(m.disp)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">💵</div><div class="stat-label">Prestado</div><div class="stat-value">'+fmoney(m.cartera)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">📈</div><div class="stat-label">Recuperado</div><div class="stat-value text-success">'+fmoney(m.cobradoHist)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#fff8e6;color:#f59e0b">💎</div><div class="stat-label">Intereses</div><div class="stat-value text-warning">'+fmoney(m.interesHist)+'</div></div></div><div class="card"><div class="card-header">📊 Panel Financiero</div><div class="card-body"><div class="row"><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Capital total:</p><p class="fw-bold">'+fmoney(m.capTotal)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Capital disponible:</p><p class="fw-bold text-info">'+fmoney(m.disp)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Total prestado:</p><p>'+fmoney(m.prestadoHist)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Total recuperado:</p><p class="text-success">'+fmoney(m.cobradoHist)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Intereses históricos:</p><p class="text-warning">'+fmoney(m.interesHist)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Gastos totales:</p><p class="text-danger">'+fmoney(m.gastos)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Ganancia neta:</p><p class="fw-bold text-success">'+fmoney(m.ganancia)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Activos: '+m.activos+' | Clientes: '+m.clientesTotal+' | Mora: '+m.moraClientes+'</p></div></div></div></div><div class="row g-2 mb-3"><div class="col-6"><div class="card"><div class="card-header">📅 Hoy</div><div class="card-body text-center"><div class="kpi-big text-info">'+fmoney(m.proyHoy)+'</div></div></div></div><div class="col-6"><div class="card"><div class="card-header">📆 Esta Semana</div><div class="card-body text-center"><div class="kpi-big text-success">'+fmoney(m.proySemana)+'</div></div></div></div></div><div class="card"><div class="card-header">📊 Métodos de Pago</div><div class="card-body"><canvas id="chartPie"></canvas></div></div>';},
        finInit:async function(){var pagos=await DB.pagos.toArray();var metodos={efectivo:0,nequi:0,transferencia:0};for(var i=0;i<pagos.length;i++){var m=pagos[i].metodo||'efectivo';if(metodos[m]!==undefined)metodos[m]++;else metodos.efectivo++;}var ctx=document.getElementById('chartPie');if(ctx){this.charts.push(new Chart(ctx,{type:'doughnut',data:{labels:['Efectivo','Nequi','Transferencia'],datasets:[{data:[metodos.efectivo,metodos.nequi,metodos.transferencia],backgroundColor:['rgba(108,92,231,0.8)','rgba(0,184,148,0.8)','rgba(59,130,246,0.8)'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:15}}}}}));}},
        showCapital:function(){var m=prompt('💰 Monto de capital:');if(m&&parseFloat(m)>0){DB.capital.add({monto:Math.round(parseFloat(m)),fecha:Date.now()}).then(function(){APP.toast('✅','Capital registrado');APP.goto('finanzas');});}},
        showGasto:function(){var m=prompt('🧾 Monto del gasto:');if(m&&parseFloat(m)>0){var c=prompt('Categoría:')||'otro';DB.gastos.add({categoria:c,monto:Math.round(parseFloat(m)),fecha:Date.now()}).then(function(){APP.toast('✅','Gasto registrado');APP.goto('finanzas');});}},
        logout:function(){localStorage.removeItem('loansw_lwiv12');location.reload();}
    };
    document.addEventListener('DOMContentLoaded',function(){APP.init();});
    </script>
</body>
</html>
