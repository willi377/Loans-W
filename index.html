<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6c5ce7">
    <title>Loans W Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);--bg:#f0f2ff;--card:#fff;--text:#1e1e2e;--sub:#5a5a7a;--border:#e2e4f0;--primary:#6c5ce7;--success:#00b894;--danger:#ff6b6b;--warning:#f59e0b;--info:#3b82f6;--shadow:0 2px 10px rgba(0,0,0,0.06);--radius:clamp(0.6rem,2vw,1rem);--font-xs:clamp(0.55rem,1.4vw,0.68rem);--font-sm:clamp(0.65rem,1.6vw,0.8rem);--font-md:clamp(0.75rem,1.9vw,0.9rem);--font-lg:clamp(0.9rem,2.3vw,1.2rem);--font-xl:clamp(1.2rem,3vw,1.6rem);--spacing-xs:clamp(0.2rem,0.6vw,0.4rem);--spacing-sm:clamp(0.4rem,1vw,0.6rem);--spacing-md:clamp(0.6rem,1.5vw,0.9rem)}
        .dark-mode{--bg:#0a0c18;--card:#151829;--text:#e8eaf0;--sub:#9094b0;--border:#252840;--shadow:0 2px 10px rgba(0,0,0,0.3)}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html{font-size:16px;-webkit-text-size-adjust:100%;height:-webkit-fill-available}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden;display:flex;flex-direction:column;padding-top:var(--sat);padding-bottom:var(--sab)}
        #login-screen{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6c5ce7,#a29bfe);z-index:9999;padding:var(--spacing-sm)}
        .login-card{background:rgba(255,255,255,0.96);border-radius:1.2rem;padding:clamp(1.5rem,5vw,2.5rem);width:min(100%,22rem);text-align:center}
        .login-logo{width:4rem;height:4rem;background:var(--primary);border-radius:1rem;display:inline-flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;margin-bottom:var(--spacing-sm)}
        .login-input{border:2px solid var(--border);border-radius:var(--radius);padding:0.8rem;font-size:var(--font-md);width:100%;margin-bottom:0.5rem;background:var(--card);color:var(--text)}
        .login-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius);padding:0.8rem;font-size:var(--font-md);font-weight:700;width:100%;cursor:pointer}
        #main-app{display:none;flex:1;flex-direction:column;min-height:100vh}
        #main-app.show{display:flex}
        .app-wrap{flex:1;width:min(100%,75rem);margin:0 auto;padding:var(--spacing-md);padding-bottom:calc(4.5rem + var(--sab) + var(--spacing-md))}
        .header{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm) var(--spacing-md);margin-bottom:var(--spacing-md);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);position:sticky;top:calc(var(--sat) + var(--spacing-xs));z-index:40;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);flex-wrap:wrap;gap:var(--spacing-xs)}
        .brand{font-size:var(--font-lg);font-weight:800;background:linear-gradient(135deg,#6c5ce7,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-actions{display:flex;gap:var(--spacing-xs)}
        .btn-icon{width:2.2rem;height:2.2rem;border-radius:50%;border:none;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--spacing-sm);margin-bottom:var(--spacing-md)}
        @media(min-width:35rem){.stats-grid{grid-template-columns:repeat(3,1fr)}}
        @media(min-width:55rem){.stats-grid{grid-template-columns:repeat(4,1fr)}}
        .stat-card{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm);box-shadow:var(--shadow);border:1px solid var(--border);min-width:0;cursor:pointer}
        .stat-icon{width:2.2rem;height:2.2rem;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:var(--spacing-xs)}
        .stat-label{font-size:var(--font-xs);color:var(--sub);text-transform:uppercase;font-weight:600}
        .stat-value{font-size:var(--font-lg);font-weight:800;margin-top:0.1rem}
        .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:var(--spacing-md);overflow:hidden;width:100%}
        .card-header{padding:var(--spacing-sm) var(--spacing-md);border-bottom:1px solid var(--border);font-weight:700;font-size:var(--font-sm);display:flex;justify-content:space-between;align-items:center}
        .card-body{padding:var(--spacing-sm) var(--spacing-md)}
        .badge{padding:0.15rem 0.6rem;border-radius:1rem;font-size:var(--font-xs);font-weight:700;white-space:nowrap}
        .badge-a{background:#e9e5ff;color:#4a3cc7}.badge-l{background:#ffe4e4;color:#d63031}.badge-p{background:#d6f7ee;color:#007a55}.badge-w{background:#fff8e6;color:#b07d00}
        .dark-mode .badge-a{background:#2d2750;color:#b8b0ff}.dark-mode .badge-l{background:#3d1c1c;color:#ff8a8a}.dark-mode .badge-p{background:#1a332a;color:#4fe0b0}
        .btn{padding:0.4rem 1rem;border-radius:3rem;font-weight:700;font-size:var(--font-xs);cursor:pointer;border:none;display:inline-flex;align-items:center;gap:0.2rem;white-space:nowrap}
        .btn:active{transform:scale(0.95)}.btn-p{background:var(--primary);color:#fff}.btn-s{background:var(--success);color:#fff}.btn-o{border:2px solid var(--primary);color:var(--primary);background:transparent}.btn-xs{padding:0.15rem 0.4rem;font-size:0.55rem}
        .nav{position:fixed;bottom:calc(var(--sab) + var(--spacing-xs));left:50%;transform:translateX(-50%);background:var(--card);display:flex;justify-content:space-around;padding:var(--spacing-xs) 0;box-shadow:0 -4px 20px rgba(0,0,0,0.1);z-index:100;border-radius:2.5rem;border:1px solid var(--border);width:min(98%,32rem);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
        @media(min-width:48rem){.nav{display:none}}
        .nav-btn{display:flex;flex-direction:column;align-items:center;font-size:0.5rem;color:var(--sub);border:none;background:none;cursor:pointer;padding:0.2rem 0.4rem;border-radius:1.5rem;font-weight:600}
        .nav-btn.active{color:var(--primary);background:rgba(108,92,231,0.1)}
        .nav-btn i{font-size:1.1rem;margin-bottom:1px}
        canvas{width:100%!important;max-height:14rem}
        .gauge-wrap{position:relative;width:min(70vw,14rem);height:min(35vw,7rem);margin:0 auto;overflow:hidden}
        .gauge-val{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);font-size:var(--font-xl);font-weight:800}
        .alert-item{padding:var(--spacing-sm);border-radius:var(--radius);margin-bottom:var(--spacing-xs);font-size:var(--font-xs);display:flex;align-items:flex-start;gap:var(--spacing-sm)}
        .alert-danger{background:#ffe4e4;color:#991b1b;border-left:4px solid #ff6b6b}.alert-warning{background:#fff8e6;color:#92400e;border-left:4px solid #f59e0b}.alert-success{background:#d6f7ee;color:#065f46;border-left:4px solid #00b894}.alert-info{background:#dbeafe;color:#1e40af;border-left:4px solid #3b82f6}
        .dark-mode .alert-danger{background:#3d1c1c;color:#ff8a8a}.dark-mode .alert-warning{background:#3d3018;color:#ffe08a}.dark-mode .alert-success{background:#1a332a;color:#4fe0b0}.dark-mode .alert-info{background:#1a2740;color:#93c5fd}
        .progress{height:0.5rem;border-radius:0.5rem;background:var(--border);overflow:hidden;width:100%}
        .progress-bar{height:100%;border-radius:0.5rem}
        .text-success{color:var(--success)!important}.text-danger{color:var(--danger)!important}.text-warning{color:var(--warning)!important}
        .d-flex{display:flex}.justify-between{justify-content:space-between}.items-center{align-items:center}.text-center{text-align:center}.fw-bold{font-weight:700}
        .mb-1{margin-bottom:0.25rem}.mb-2{margin-bottom:0.5rem}.mb-3{margin-bottom:0.75rem}.mt-1{margin-top:0.25rem}.mt-2{margin-top:0.5rem}.mt-3{margin-top:0.75rem}
        .w-100{width:100%}.p-2{padding:0.5rem}.p-3{padding:0.75rem}.p-4{padding:1rem}.text-muted{color:var(--sub)}
        .row{display:flex;flex-wrap:wrap}.col-6{flex:0 0 50%;max-width:50%}.g-2{gap:0.5rem}
        .list-item{display:flex;align-items:center;padding:var(--spacing-sm);border-bottom:1px solid var(--border);gap:var(--spacing-sm);cursor:pointer}
        .list-item:last-child{border-bottom:none}
        .avatar-sm{width:2rem;height:2rem;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem;flex-shrink:0}
        .toast-box{position:fixed;top:calc(var(--sat) + var(--spacing-sm));right:var(--spacing-sm);z-index:9999;max-width:90vw}
        .toast{background:var(--card);border-radius:var(--radius);padding:var(--spacing-sm);box-shadow:0 8px 20px rgba(0,0,0,0.15);margin-bottom:var(--spacing-xs);font-weight:600;font-size:var(--font-xs);border-left:4px solid var(--primary)}
        .score-hero{font-size:clamp(3rem,10vw,5rem);font-weight:900;line-height:1;letter-spacing:-2px}
        .ranking-list{max-height:18rem;overflow-y:auto}
        @media(max-width:22rem){.stats-grid{grid-template-columns:repeat(2,1fr);gap:0.2rem}}
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <div class="login-logo">🧠</div>
            <h3 style="font-weight:800;margin-bottom:0.2rem">Loans W</h3>
            <p style="color:var(--sub);margin-bottom:var(--spacing-sm);font-size:var(--font-xs)">Intelligence Engine</p>
            <input type="password" id="pwd" class="login-input" placeholder="🔒 Contraseña" autocomplete="off">
            <button class="login-btn" id="loginBtn">Ingresar</button>
            <div id="login-err" style="color:#ff6b6b;font-weight:600;margin-top:0.5rem;font-size:0.7rem"></div>
            <p style="color:var(--sub);font-size:0.6rem;margin-top:0.5rem">admin</p>
        </div>
    </div>
    <div id="main-app">
        <div class="app-wrap" id="page"><div class="text-center" style="padding:2.5rem;color:var(--sub)">Cargando...</div></div>
        <nav class="nav">
            <button class="nav-btn active" data-p="dashboard"><i class="bi bi-speedometer2"></i>Inicio</button>
            <button class="nav-btn" data-p="lwi"><i class="bi bi-cpu-fill"></i>LWI</button>
            <button class="nav-btn" data-p="clientes"><i class="bi bi-people-fill"></i>Clientes</button>
            <button class="nav-btn" data-p="prestamos"><i class="bi bi-cash-stack"></i>Préstamos</button>
            <button class="nav-btn" data-p="finanzas"><i class="bi bi-bank"></i>Capital</button>
        </nav>
    </div>
    <div class="toast-box" id="toasts"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    "use strict";
    var COP=new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0,minimumFractionDigits:0});
    var fmoney=function(v){return COP.format(Math.round(v||0));};
    var sanitize=function(s){if(!s||typeof s!=='string')return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;};

    var DB=new Dexie('LoansWLWIv2');
    DB.version(1).stores({cfg:'clave',clientes:'++id',prestamos:'++id,cliente_id,estado',cuotas:'++id,prestamo_id,estado,fecha_vencimiento',pagos:'++id,prestamo_id,cuota_id,fecha',capital:'++id,fecha',gastos:'++id,fecha'});

    var APP={
        charts:[],dark:false,
        init:async function(){
            await DB.open();
            var ph=await DB.cfg.get('pwd_hash');
            if(!ph){var h=await this.hashPwd('admin');await DB.cfg.put({clave:'pwd_hash',valor:h});await DB.cfg.put({clave:'mora',valor:'5'});await DB.cfg.put({clave:'dark',valor:'false'});await DB.cfg.put({clave:'capital_inicial',valor:'0'});}
            var d=await DB.cfg.get('dark');if(d&&d.valor==='true'){this.dark=true;document.body.classList.add('dark-mode');}
            document.getElementById('loginBtn').onclick=function(){APP.login();};
            document.getElementById('pwd').onkeydown=function(e){if(e.key==='Enter')APP.login();};
            document.querySelectorAll('.nav-btn').forEach(function(b){b.onclick=function(){APP.goto(b.dataset.p);};});
            if(localStorage.getItem('loansw_lwi2')==='yes'){document.getElementById('login-screen').style.display='none';document.getElementById('main-app').style.display='flex';document.getElementById('main-app').classList.add('show');this.goto('dashboard');}
        },
        hashPwd:async function(p){var e=new TextEncoder(),s=crypto.getRandomValues(new Uint8Array(16)),k=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveBits']),h=await crypto.subtle.deriveBits({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},k,256);return JSON.stringify({salt:Array.from(s),hash:Array.from(new Uint8Array(h))});},
        verifyPwd:async function(p,st){try{var d=JSON.parse(st),s=d.salt,h=d.hash,e=new TextEncoder(),k=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveBits']),de=await crypto.subtle.deriveBits({name:'PBKDF2',salt:new Uint8Array(s),iterations:100000,hash:'SHA-256'},k,256),da=new Uint8Array(de),ha=new Uint8Array(h);if(da.length!==ha.length)return false;for(var i=0;i<da.length;i++){if(da[i]!==ha[i])return false;}return true;}catch(e){return false;}},
        login:async function(){var p=document.getElementById('pwd').value;if(!p){document.getElementById('login-err').textContent='Ingrese contraseña';return;}var s=await DB.cfg.get('pwd_hash');if(!s)return;if(await this.verifyPwd(p,s.valor)){localStorage.setItem('loansw_lwi2','yes');document.getElementById('login-screen').style.display='none';document.getElementById('main-app').style.display='flex';document.getElementById('main-app').classList.add('show');this.goto('dashboard');}else{document.getElementById('login-err').textContent='Contraseña incorrecta';}},
        goto:function(p){document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('active');});var a=document.querySelector('.nav-btn[data-p="'+p+'"]');if(a)a.classList.add('active');this.render(p);window.scrollTo({top:0,behavior:'smooth'});},
        destroyCharts:function(){this.charts.forEach(function(c){try{c.destroy();}catch(e){}});this.charts=[];},
        toast:function(t,m){var box=document.getElementById('toasts');if(!box)return;var el=document.createElement('div');el.className='toast';el.innerHTML='<strong>'+sanitize(t)+'</strong><br><small>'+sanitize(m)+'</small>';box.appendChild(el);setTimeout(function(){el.style.opacity='0';el.style.transition='0.3s';setTimeout(function(){el.remove();},300);},2500);},

        // ========== DATOS ==========
        getData:async function(){
            var clientes=await DB.clientes.toArray();
            var prestamos=await DB.prestamos.toArray();
            var cuotas=await DB.cuotas.toArray();
            var pagos=await DB.pagos.toArray();
            var capital=await DB.capital.toArray();
            var gastos=await DB.gastos.toArray();
            var capInicial=parseFloat((await DB.cfg.get('capital_inicial'))?.valor||'0');
            return {clientes:clientes,prestamos:prestamos,cuotas:cuotas,pagos:pagos,capital:capital,gastos:gastos,capInicial:capInicial,now:new Date()};
        },
        getMetrics:function(d){
            var capTotal=d.capital.reduce(function(s,c){return s+(c.monto||0);},0)+d.capInicial;
            var gastosTotal=d.gastos.reduce(function(s,g){return s+(g.monto||0);},0);
            var cartera=d.prestamos.filter(function(p){return p.estado==='activo';}).reduce(function(s,p){return s+(p.monto||0);},0);
            var cobradoHist=d.pagos.reduce(function(s,p){return s+(p.monto||0);},0);
            var interesHist=0;
            for(var i=0;i<d.pagos.length;i++){
                for(var j=0;j<d.cuotas.length;j++){
                    if(d.cuotas[j].id===d.pagos[i].cuota_id){interesHist+=d.cuotas[j].interes||0;break;}
                }
            }
            var disp=capTotal+cobradoHist+interesHist-cartera-gastosTotal;
            var ganancia=cobradoHist+interesHist-gastosTotal;
            var moraMonto=0;var moraSet=new Set();
            for(var k=0;k<d.cuotas.length;k++){
                if(d.cuotas[k].estado==='atrasada'){
                    moraMonto+=d.cuotas[k].monto_total||0;
                    var p=d.prestamos.find(function(x){return x.id===d.cuotas[k].prestamo_id;});
                    if(p)moraSet.add(p.cliente_id);
                }
            }
            var activos=d.prestamos.filter(function(p){return p.estado==='activo';}).length;
            var finalizados=d.prestamos.filter(function(p){return p.estado==='pagado';}).length;
            var hoy=new Date(d.now.getFullYear(),d.now.getMonth(),d.now.getDate());
            var proyHoy=0,proyMes=0;
            var finMes=new Date(d.now.getFullYear(),d.now.getMonth()+1,0);
            for(var l=0;l<d.cuotas.length;l++){
                var c=d.cuotas[l];
                if(c.estado==='pagada')continue;
                if(c.fecha_vencimiento>=hoy.getTime()&&c.fecha_vencimiento<hoy.getTime()+86400000)proyHoy+=c.monto_total||0;
                if(c.fecha_vencimiento>=d.now.getTime()&&c.fecha_vencimiento<=finMes.getTime()&&c.estado==='pendiente')proyMes+=c.monto_total||0;
            }
            return{capTotal:capTotal,gastos:gastosTotal,cartera:cartera,cobradoHist:cobradoHist,interesHist:interesHist,disp:disp,ganancia:ganancia,moraMonto:moraMonto,moraClientes:moraSet.size,activos:activos,finalizados:finalizados,clientesTotal:d.clientes.length,proyHoy:proyHoy,proyMes:proyMes};
        },
        calcSalud:function(m){
            var score=0;
            if(m.capTotal>0){var liq=(m.disp/(m.capTotal+1))*100;score+=Math.min(liq/2.5,20);}
            if(m.cartera>0){var moraP=(m.moraMonto/(m.cartera+1))*100;score+=Math.max(0,20-moraP);}
            if(m.capTotal>0){var rent=(m.ganancia/(m.capTotal+1))*100;score+=Math.min(rent*1.5,18);}
            if(m.cartera>0&&m.capTotal>0){var rec=(m.cobradoHist/(m.capTotal+m.cartera+1))*100;score+=Math.min(rec/2,14);}
            if(m.clientesTotal>0){score+=Math.min((m.activos/(m.clientesTotal+1))*10,10);}
            if(m.capTotal>0&&m.cartera>0){score+=Math.min(((m.proyMes+m.disp)/(m.capTotal+1))*8,8);}
            // Puntualidad
            var totalCuotas=0,pagadas=0;
            for(var i=0;i<(this._lastData?.cuotas?.length||0);i++){totalCuotas++;if(this._lastData.cuotas[i].estado==='pagada')pagadas++;}
            if(totalCuotas>0)score+=Math.round((pagadas/totalCuotas)*10);
            // Concentración
            var concen=this.calcConcentracion();score+=Math.max(0,10-concen*10);
            return Math.max(5,Math.min(98,Math.round(score)));
        },
        _lastData:null,
        calcConcentracion:function(){
            var d=this._lastData;if(!d)return 0;
            var act=d.prestamos.filter(function(p){return p.estado==='activo';});
            if(act.length===0)return 0;
            var total=act.reduce(function(s,p){return s+(p.monto||0);},0);
            if(total===0)return 0;
            var porCliente={};
            act.forEach(function(p){porCliente[p.cliente_id]=(porCliente[p.cliente_id]||0)+(p.monto||0);});
            var max=0;for(var k in porCliente){if(porCliente[k]>max)max=porCliente[k];}
            return max/total;
        },

        render:async function(p){
            this.destroyCharts();var c=document.getElementById('page');if(!c)return;c.innerHTML='';
            if(p==='dashboard'){c.innerHTML=await this.dashHTML();setTimeout(function(){APP.dashInit();},300);}
            else if(p==='lwi'){c.innerHTML='<div class="text-center p-4"><div style="width:2rem;height:2rem;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem"></div><p style="color:var(--sub)">Analizando tu negocio...</p></div>';var self=this;setTimeout(async function(){var html=await self.lwiHTML();c.innerHTML=html;setTimeout(function(){self.lwiInit();},200);},100);}
            else if(p==='clientes'){c.innerHTML=this.cliHTML();this.cliList();}
            else if(p==='prestamos'){c.innerHTML=await this.preHTML();this.preList();}
            else if(p==='finanzas'){c.innerHTML=await this.finHTML();}
        },

        // ========== DASHBOARD ==========
        dashHTML:async function(){
            var d=await this.getData();this._lastData=d;var m=this.getMetrics(d),score=this.calcSalud(m),color=score>=75?'#00b894':score>=50?'#f59e0b':'#ff6b6b',salud=score>=90?'Excelente':score>=75?'Saludable':score>=50?'Regular':'Riesgo';
            return'<div class="header"><span class="brand">Loans W 🧠</span><div class="header-actions"><button class="btn-icon" onclick="APP.goto(\'lwi\')">🧠</button><button class="btn-icon" onclick="APP.logout()">↩️</button></div></div><div class="stats-grid"><div class="stat-card" onclick="APP.goto(\'lwi\')"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">🧠</div><div class="stat-label">Salud LWI</div><div class="stat-value" style="color:'+color+'">'+score+'/100</div></div><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">🏦</div><div class="stat-label">Capital Disp.</div><div class="stat-value">'+fmoney(m.disp)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">💵</div><div class="stat-label">Cartera</div><div class="stat-value">'+fmoney(m.cartera)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#fff8e6;color:#f59e0b">📈</div><div class="stat-label">Ganancia</div><div class="stat-value text-warning">'+fmoney(m.ganancia)+'</div></div></div><div class="card"><div class="card-header">🧠 Loans W Intelligence</div><div class="card-body text-center"><p style="font-size:var(--font-md)">Salud: <strong style="color:'+color+'">'+score+'/100 '+salud+'</strong></p><p style="font-size:var(--font-sm);color:var(--sub)">'+m.activos+' préstamos activos · '+m.moraClientes+' en mora</p><button class="btn btn-p mt-2" onclick="APP.goto(\'lwi\')">🧠 Abrir Motor LWI</button></div></div><div class="card"><div class="card-header">📊 Ganancias Mensuales</div><div class="card-body"><canvas id="chart1"></canvas></div></div>';
        },
        dashInit:async function(){
            var c1=document.getElementById('chart1');if(c1){var meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'],data=new Array(12).fill(0),pagos=await DB.pagos.toArray();for(var i=0;i<pagos.length;i++){var m=new Date(pagos[i].fecha).getMonth();data[m]+=pagos[i].monto||0;}this.charts.push(new Chart(c1,{type:'bar',data:{labels:meses,datasets:[{data:data.map(function(v){return Math.round(v);}),backgroundColor:'rgba(108,92,231,0.8)',borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:function(v){return fmoney(v);}}}}}}));}
        },

        // ========== MOTOR LWI ==========
        lwiHTML:async function(){
            var d=await this.getData();this._lastData=d;var m=this.getMetrics(d),score=this.calcSalud(m),color=score>=75?'#00b894':score>=50?'#f59e0b':'#ff6b6b',salud=score>=90?'Excelente':score>=75?'Saludable':score>=50?'Regular':'Riesgo';
            // Recomendaciones
            var recs=[];
            if(m.disp>m.cartera&&m.cartera>0){var prom=m.cartera/(m.activos||1);var cant=Math.floor(m.disp/(prom||1));if(cant>0)recs.push({icon:'✅',msg:'Puedes otorgar ~'+cant+' préstamos más de '+fmoney(prom)+' c/u.'});}
            if(m.cartera>0){var moraP=Math.round((m.moraMonto/(m.cartera+1))*100);if(moraP>25)recs.push({icon:'🚨',msg:'Más del '+moraP+'% de tu cartera está en mora.'});else if(moraP>10)recs.push({icon:'⚠️',msg:'Mora al '+moraP+'%. Monitorea.'});}
            if(m.disp>m.cartera*2)recs.push({icon:'💰',msg:'Capital inmovilizado: '+fmoney(m.disp)+'. Presta más.'});
            if(m.disp<m.cartera*0.3&&m.cartera>0)recs.push({icon:'⚠️',msg:'Liquidez baja: '+fmoney(m.disp)});
            if(m.interesHist>0&&m.cobradoHist>0)recs.push({icon:'📈',msg:'Intereses: '+Math.round((m.interesHist/(m.cobradoHist+1))*100)+'% de tus ingresos.'});
            if(m.ganancia>0&&m.capTotal>0){var rent=Math.round((m.ganancia/(m.capTotal+1))*100);recs.push({icon:'📊',msg:'Rentabilidad: '+rent+'%.'+(rent>15?' ¡Excelente!':rent>5?' Estable.':' Mejora márgenes.')});}
            if(recs.length===0)recs.push({icon:'🎯',msg:'Negocio estable. Monitorea indicadores.'});

            // Clasificación clientes
            var clientes=[];
            for(var i=0;i<d.clientes.length;i++){
                var cl=d.clientes[i];
                var ps=d.prestamos.filter(function(p){return p.cliente_id===cl.id;});
                if(ps.length===0)continue;
                var total=ps.reduce(function(s,p){return s+(p.monto||0);},0);
                var cuotas=[];
                for(var j=0;j<ps.length;j++){var cu=d.cuotas.filter(function(c){return c.prestamo_id===ps[j].id;});cuotas=cuotas.concat(cu);}
                var pagadas=cuotas.filter(function(c){return c.estado==='pagada';}).length;
                var punt=cuotas.length>0?Math.round((pagadas/cuotas.length)*100):0;
                var interesGen=cuotas.filter(function(c){return c.estado==='pagada';}).reduce(function(s,c){return s+(c.interes||0);},0);
                var scoreCl=punt*0.5+(Math.min(total/100000,100))*0.2+(ps.length*5);
                var nivel=scoreCl>=85?'⭐ Platino':scoreCl>=65?'🥇 Oro':scoreCl>=45?'🥈 Plata':scoreCl>=25?'🥉 Bronce':'🚨 Riesgoso';
                clientes.push({nombre:cl.nombre,total:total,prestamos:ps.length,puntualidad:punt,interesGen:interesGen,score:Math.round(scoreCl),nivel:nivel});
            }
            clientes.sort(function(a,b){return b.score-a.score;});

            // Cobranza
            var cobranza=[];
            for(var k=0;k<d.cuotas.length;k++){
                var cu=d.cuotas[k];if(cu.estado!=='atrasada')continue;
                var p=d.prestamos.find(function(x){return x.id===cu.prestamo_id;});if(!p)continue;
                var cl=d.clientes.find(function(x){return x.id===p.cliente_id;});if(!cl)continue;
                var dias=Math.round((d.now.getTime()-cu.fecha_vencimiento)/86400000);
                var prioridad=dias>30?'🔴 Muy Alta':dias>15?'🟠 Alta':dias>5?'🟡 Media':'🟢 Baja';
                cobranza.push({cliente:cl.nombre,cuota:cu.numero_cuota,monto:cu.monto_total||0,dias:dias,prioridad:prioridad});
            }
            cobranza.sort(function(a,b){return b.dias-a.dias;});

            // Predicciones
            var semana=new Date(d.now.getFullYear(),d.now.getMonth(),d.now.getDate()+7);
            var proySemana=0;
            for(var l=0;l<d.cuotas.length;l++){var c2=d.cuotas[l];if(c2.fecha_vencimiento>=d.now.getTime()&&c2.fecha_vencimiento<=semana.getTime()&&c2.estado==='pendiente')proySemana+=c2.monto_total||0;}
            var inteProy=Math.round(m.proyMes*0.12),capProy=Math.round(m.proyMes*0.88);

            // HTML
            var html='';
            html+='<div class="header"><span class="brand">🧠 Motor LWI</span><button class="btn-icon" onclick="APP.goto(\'dashboard\')">←</button></div>';
            // Gauge
            html+='<div class="card"><div class="card-body text-center"><div class="gauge-wrap"><canvas id="gaugeChart"></canvas></div><div class="score-hero" style="color:'+color+'">'+score+'</div><p style="font-size:var(--font-lg);font-weight:700;color:'+color+'">'+salud+'</p><p style="font-size:var(--font-sm);color:var(--sub)">Índice de Salud del Negocio</p></div></div>';
            // KPIs
            html+='<div class="stats-grid"><div class="stat-card"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">💰</div><div class="stat-label">Capital Disp.</div><div class="stat-value">'+fmoney(m.disp)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">💵</div><div class="stat-label">Cartera</div><div class="stat-value">'+fmoney(m.cartera)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">📈</div><div class="stat-label">Ganancia</div><div class="stat-value text-success">'+fmoney(m.ganancia)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#ffe4e4;color:#ff6b6b">⚠️</div><div class="stat-label">Mora</div><div class="stat-value text-danger">'+m.moraClientes+' cli.</div></div></div>';
            // Recomendaciones
            html+='<div class="card"><div class="card-header">💡 Recomendaciones</div><div class="card-body">';
            for(var r=0;r<recs.length;r++){html+='<div class="alert-item alert-info">'+recs[r].icon+' '+recs[r].msg+'</div>';}
            html+='</div></div>';
            // Predicciones
            html+='<div class="card"><div class="card-header">📅 Predicciones</div><div class="card-body"><div class="row"><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Hoy</p><p class="fw-bold text-info">'+fmoney(m.proyHoy)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Esta semana</p><p class="fw-bold">'+fmoney(proySemana)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Este mes</p><p class="fw-bold text-success">'+fmoney(m.proyMes)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Interés esperado</p><p class="fw-bold text-warning">'+fmoney(inteProy)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Capital a recuperar</p><p class="fw-bold">'+fmoney(capProy)+'</p></div><div class="col-6 mb-2"><p style="font-size:var(--font-xs)">Disp. proyectado</p><p class="fw-bold">'+fmoney(m.disp+capProy)+'</p></div></div></div></div>';
            // Ranking clientes
            html+='<div class="card"><div class="card-header">🏆 Clasificación de Clientes</div><div class="card-body p-0 ranking-list">';
            var badges={Platino:'badge-p',Oro:'badge-w',Plata:'badge-a',Bronce:'badge-a',Riesgoso:'badge-l'};
            for(var t=0;t<Math.min(clientes.length,10);t++){html+='<div class="list-item"><div class="avatar-sm">'+(clientes[t].nombre||'?')[0]+'</div><div style="flex:1"><strong>'+sanitize(clientes[t].nombre)+'</strong><br><small style="color:var(--sub)">'+clientes[t].prestamos+' prést. · Punt: '+clientes[t].puntualidad+'% · '+fmoney(clientes[t].interesGen)+'</small></div><span class="badge '+badges[clientes[t].nivel.split(' ')[1]||clientes[t].nivel]+'">'+clientes[t].nivel+'</span></div>';}
            html+='</div></div>';
            // Cobranza
            if(cobranza.length>0){html+='<div class="card"><div class="card-header">📋 Prioridad de Cobranza</div><div class="card-body p-0 ranking-list">';for(var u=0;u<Math.min(cobranza.length,10);u++){html+='<div class="list-item"><div class="avatar-sm" style="background:#ff6b6b">!</div><div style="flex:1"><strong>'+sanitize(cobranza[u].cliente)+'</strong><br><small style="color:var(--sub)">Cuota #'+cobranza[u].cuota+' · '+cobranza[u].dias+' días · '+fmoney(cobranza[u].monto)+'</small></div><span class="badge badge-l">'+cobranza[u].prioridad+'</span></div>';}html+='</div></div>';}
            // Gráfico
            html+='<div class="card"><div class="card-header">📊 Indicadores LWI</div><div class="card-body"><canvas id="chartLWI1"></canvas></div></div>';
            return html;
        },
        lwiInit:function(){
            var self=this;
            setTimeout(async function(){
                var d=self._lastData;if(!d)d=await self.getData();
                var m=self.getMetrics(d),score=self.calcSalud(m),color=score>=75?'#00b894':score>=50?'#f59e0b':'#ff6b6b';
                var ctx=document.getElementById('gaugeChart');if(ctx){var c=new Chart(ctx,{type:'doughnut',data:{datasets:[{data:[score,100-score],backgroundColor:[color,'#e2e8f0'],borderWidth:0,cutout:'78%'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{enabled:false}}}});self.charts.push(c);}
                var punt=0,totalCu=0;for(var i=0;i<d.cuotas.length;i++){totalCu++;if(d.cuotas[i].estado==='pagada')punt++;}var puntPct=totalCu>0?Math.round((punt/totalCu)*100):0;
                var ctx2=document.getElementById('chartLWI1');if(ctx2){var ch=new Chart(ctx2,{type:'bar',data:{labels:['Salud','Puntualidad','Liquidez','Recuperación'],datasets:[{data:[score,puntPct,Math.min(Math.round((m.disp/(m.capTotal+1))*100),100),Math.min(Math.round((m.cobradoHist/(m.capTotal+m.cartera+1))*100),100)],backgroundColor:['rgba(108,92,231,0.8)','rgba(0,184,148,0.8)','rgba(59,130,246,0.8)','rgba(245,158,11,0.8)'],borderRadius:8}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}}}}}});self.charts.push(ch);}
            },300);
        },

        // ========== CLIENTES ==========
        cliHTML:function(){return'<div class="header"><span class="brand">👥 Clientes</span><button class="btn btn-p" onclick="APP.showCliente()">+ Nuevo</button></div><input class="f-control" id="cliSearch" placeholder="🔍 Buscar..." oninput="APP.cliList()" style="margin-bottom:var(--spacing-sm);border:2px solid var(--border);border-radius:0.4rem;padding:0.5rem;width:100%;background:var(--card);color:var(--text)"><div class="card"><div class="card-body p-0" id="cliList"></div></div>';},
        cliList:async function(){var s=(document.getElementById('cliSearch')?.value||'').toLowerCase(),list=await DB.clientes.toArray();if(s)list=list.filter(function(c){return(c.nombre||'').toLowerCase().includes(s);});list.sort(function(a,b){return b.id-a.id;});var el=document.getElementById('cliList');if(el){var h='';for(var i=0;i<list.length;i++){h+='<div class="list-item" onclick="APP.verCliente('+list[i].id+')"><div class="avatar-sm">'+(list[i].nombre||'?')[0]+'</div><div style="flex:1"><strong>'+sanitize(list[i].nombre)+'</strong><br><small style="color:var(--sub)">'+sanitize(list[i].cedula||'Sin ID')+'</small></div></div>';}el.innerHTML=h||'<p class="text-muted text-center p-4">No hay clientes</p>';}},
        showCliente:function(){var n=prompt('Nombre:');if(!n)return;var c=prompt('Cédula:');DB.clientes.add({nombre:n,cedula:c||'',telefono:'',categoria:'regular'}).then(function(){APP.cliList();APP.toast('✅','Cliente creado');});},
        verCliente:async function(id){var c=await DB.clientes.get(id),ps=await DB.prestamos.where({cliente_id:id}).toArray(),h='';for(var i=0;i<ps.length;i++){var cu=await DB.cuotas.where({prestamo_id:ps[i].id}).toArray(),pa=cu.filter(function(x){return x.estado==='pagada';}).length;h+='<div class="list-item"><div class="avatar-sm">$</div><div style="flex:1"><strong>'+fmoney(ps[i].monto||0)+'</strong><br><small>'+pa+'/'+cu.length+' pagadas</small></div></div>';}document.getElementById('page').innerHTML='<div class="header"><span class="brand">'+sanitize(c.nombre)+'</span><button class="btn-icon" onclick="APP.goto(\'clientes\')">←</button></div><div class="card"><div class="card-body"><p>'+sanitize(c.cedula||'-')+' | '+sanitize(c.telefono||'-')+'</p></div></div><h6 class="mt-2">Préstamos</h6><div class="card"><div class="card-body p-0">'+h+'</div></div>';},

        // ========== PRÉSTAMOS ==========
        preHTML:async function(){return'<div class="header"><span class="brand">💵 Préstamos</span><button class="btn btn-p" onclick="APP.showPrestamo()">+ Nuevo</button></div><select class="f-control" id="preFilter" onchange="APP.preList()" style="margin-bottom:var(--spacing-sm);border:2px solid var(--border);border-radius:0.4rem;padding:0.5rem;width:100%;background:var(--card);color:var(--text)"><option value="todos">Todos</option><option value="activo">Activos</option><option value="pagado">Pagados</option></select><div class="card"><div class="card-body p-0" id="preList"></div></div>';},
        preList:async function(){var f=document.getElementById('preFilter')?.value||'todos',list=await DB.prestamos.toArray();if(f!=='todos')list=list.filter(function(p){return p.estado===f;});list.sort(function(a,b){return b.id-a.id;});var h='';for(var i=0;i<list.length;i++){var cl=await DB.clientes.get(list[i].cliente_id),cu=await DB.cuotas.where({prestamo_id:list[i].id}).toArray(),pa=cu.filter(function(c){return c.estado==='pagada';}).length,pc=cu.length>0?Math.round((pa/cu.length)*100):0;h+='<div class="list-item" onclick="APP.verPrestamo('+list[i].id+')"><div class="avatar-sm">'+(cl?.nombre||'?')[0]+'</div><div style="flex:1"><strong>'+sanitize(cl?.nombre)+'</strong><br><small>'+fmoney(list[i].monto||0)+' · '+pc+'%</small></div></div>';}document.getElementById('preList').innerHTML=h||'<p class="text-muted text-center p-4">No hay préstamos</p>';},
        showPrestamo:function(){var m=parseFloat(prompt('Monto:'));if(!m)return;var cl=parseInt(prompt('ID Cliente:'));if(!cl)return;var t=parseFloat(prompt('Tasa (%):')||'10');DB.prestamos.add({cliente_id:cl,monto:m,tasa:t,tipo:'simple',fecha:Date.now(),frecuencia:'mensual',plazo:12,estado:'activo'}).then(function(pid){for(var i=1;i<=12;i++){DB.cuotas.add({prestamo_id:pid,numero_cuota:i,fecha_vencimiento:Date.now()+i*30*86400000,capital:Math.round(m/12),interes:Math.round(m*t/100/12),monto_total:Math.round(m/12+m*t/100/12),saldo_restante:Math.round(m-m/12*i),estado:'pendiente'});}APP.preList();APP.toast('✅','Préstamo creado');});},
        verPrestamo:async function(id){var p=await DB.prestamos.get(id);if(!p)return;var cl=await DB.clientes.get(p.cliente_id),cu=await DB.cuotas.where({prestamo_id:id}).toArray();cu.sort(function(a,b){return a.numero_cuota-b.numero_cuota;});var pa=cu.filter(function(c){return c.estado==='pagada';}).length,rows='';for(var i=0;i<cu.length;i++){rows+='<tr><td>'+cu[i].numero_cuota+'</td><td>'+new Date(cu[i].fecha_vencimiento).toLocaleDateString('es-CO')+'</td><td>'+fmoney(cu[i].monto_total||0)+'</td><td><span class="badge '+(cu[i].estado==='pagada'?'badge-p':cu[i].estado==='atrasada'?'badge-l':'badge-w')+'">'+cu[i].estado+'</span></td><td>'+(cu[i].estado!=='pagada'?'<button class="btn btn-s btn-xs" onclick="APP.pagarCuota('+id+','+cu[i].id+')">💵</button>':'✅')+'</td></tr>';}document.getElementById('page').innerHTML='<div class="header"><span class="brand">Préstamo #'+id+'</span><button class="btn-icon" onclick="APP.goto(\'prestamos\')">←</button></div><div class="card"><div class="card-body"><p><strong>Cliente:</strong> '+sanitize(cl?.nombre)+'</p><p><strong>Monto:</strong> '+fmoney(p.monto||0)+'</p><p>'+pa+'/'+cu.length+' cuotas</p></div></div><div class="card"><div class="card-header">📋 Cronograma</div><div style="overflow-x:auto"><table class="table table-sm"><thead><tr><th>#</th><th>Fecha</th><th>Cuota</th><th>Estado</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';},
        pagarCuota:function(pid,cid){DB.cuotas.get(cid).then(function(cu){DB.cuotas.update(cid,{estado:'pagada',saldo_restante:0});DB.pagos.add({prestamo_id:pid,cuota_id:cid,monto:cu.monto_total,fecha:Date.now(),metodo:'efectivo'});APP.verPrestamo(pid);APP.toast('✅','Pago registrado');});},

        // ========== FINANZAS ==========
        finHTML:async function(){var d=await this.getData(),m=this.getMetrics(d);return'<div class="header"><span class="brand">🏦 Capital</span><div class="header-actions"><button class="btn btn-p" onclick="APP.showCapital()">+ Capital</button><button class="btn btn-d" onclick="APP.showGasto()">+ Gasto</button></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-icon" style="background:#e9e5ff;color:#6c5ce7">🏦</div><div class="stat-label">Capital Disp.</div><div class="stat-value">'+fmoney(m.disp)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#dbeafe;color:#3b82f6">💵</div><div class="stat-label">Prestado</div><div class="stat-value">'+fmoney(m.cartera)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#d6f7ee;color:#00b894">📈</div><div class="stat-label">Ganancia</div><div class="stat-value text-success">'+fmoney(m.ganancia)+'</div></div><div class="stat-card"><div class="stat-icon" style="background:#ffe4e4;color:#ff6b6b">🧾</div><div class="stat-label">Gastos</div><div class="stat-value text-danger">'+fmoney(m.gastos)+'</div></div></div><p style="text-align:center;color:var(--sub)">Usa el <strong>Motor LWI 🧠</strong> para análisis.</p>';},
        showCapital:function(){var m=prompt('Monto:');if(m&&parseFloat(m)>0){DB.capital.add({monto:Math.round(parseFloat(m)),fecha:Date.now()}).then(function(){APP.toast('✅','Capital registrado');APP.goto('finanzas');});}},
        showGasto:function(){var m=prompt('Monto:');if(m&&parseFloat(m)>0){DB.gastos.add({monto:Math.round(parseFloat(m)),categoria:'otro',fecha:Date.now()}).then(function(){APP.toast('✅','Gasto registrado');APP.goto('finanzas');});}},

        logout:function(){localStorage.removeItem('loansw_lwi2');location.reload();}
    };
    document.addEventListener('DOMContentLoaded',function(){APP.init();});
    </script>
